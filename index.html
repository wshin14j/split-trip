        ${expandedDetail}
      </div>`;
    }).join(''):`<div style="padding:20px 4px;text-align:center;font-size:13px;color:var(--t2);">此類別沒有記錄</div>`)+'<div style="display:flex;align-items:center;gap:10px;padding:56px 16px 80px;"><div style="flex:1;height:1px;background:linear-gradient(to right,transparent,var(--border));"></div><span style="color:var(--border);font-size:10px;flex-shrink:0;">◆</span><div style="flex:1;height:1px;background:linear-gradient(to left,transparent,var(--border));"></div></div>';
  },

  // ── SETTLEMENT ────────────────────────────────
  renderSettlement(t,c){
    const bal=calcBal(t);
    // auto confetti when fully settled
    const _checkSettled=()=>{
      const pr=t.payRecords||[];
      const ots=minimizeTx(bal);
      if(!ots.length) return;
      const hasPending=Object.values(t.expenses||{}).some(e=>e.note==='金額待補');
      if(hasPending) return;
      const done=ots.every(ot=>{
        const p=pr.filter(r=>r.from===ot.from&&r.to===ot.to)
          .reduce((s,r)=>s+toBase(r.amt,r.cur||t.baseCurrency||'TWD',t.rates,t.baseCurrency),0);
        return (ot.amt-p)<=0.5;
      });
      const now=Date.now();
      if(done&&(!this._lastConfetti||now-this._lastConfetti>5000)){
        this._lastConfetti=now;
        setTimeout(()=>this.showConfetti(),300);
      }
    };
    _checkSettled();
    const payRecs=t.payRecords||[];
    const adjBal={...bal};
    payRecs.forEach(r=>{
      const a=toBase(r.amt,r.cur||t.baseCurrency||'TWD',t.rates,t.baseCurrency);
      if(adjBal[r.from]!==undefined) adjBal[r.from]+=a;
      if(adjBal[r.to]!==undefined) adjBal[r.to]-=a;
    });
    // adjBalFull = adjBal + fundDeposits，用於債務卡片（判斷誰已還清）
    const adjBalFull={...adjBal};
    (t.fundDeposits||[]).forEach(d=>{
      const a=toBase(d.amt,d.cur||t.baseCurrency||'TWD',t.rates,t.baseCurrency);
      if(adjBalFull[d.fromMemberId]!==undefined) adjBalFull[d.fromMemberId]+=a;
    });
    const txs=minimizeTx(adjBalFull);
    const mName=id=>{const m=t.members.find(m=>m.id===id);return m?.name||id;};
    const hasExps=Object.keys(t.expenses||{}).length>0;
    // Currency selector
    if(!this._settleCur) this._settleCur=t.baseCurrency;
    const dispCur=this._settleCur;
    const dispSym=(C[dispCur]||C.TWD).sym;
    const fmtS=v=>{
      const converted=toBase(v,t.baseCurrency,t.rates,dispCur);
      return `${dispSym}${Math.round(Math.abs(converted)).toLocaleString()}`;
    };
    const allCurs=['TWD','JPY','USD','EUR','GBP','KRW','VND','THB','IDR',...(t.customCurrencies||[]).map(c=>c.code)].filter((v,i,a)=>a.indexOf(v)===i);
    // Currencies actually used in this trip (excluding base)
    const usedExpCurs=[...new Set(Object.values(t.expenses||{}).map(e=>e.currency))].filter(c=>c&&c!==t.baseCurrency);
    const rateRows=usedExpCurs.map(c=>{
      const rate=t.rates[c]||DEF[c]||1;
      const baseSym=(C[t.baseCurrency]||C.TWD).sym;
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);">
        <span style="font-size:12px;color:var(--t2);">1 ${c} → ${t.baseCurrency}</span>
        <span style="font-size:12px;font-weight:600;color:var(--t1);">${baseSym}${rate}</span>
      </div>`;
    }).join('');
    const curSelect=`<div class="card" style="padding:14px 16px;margin-bottom:16px;">
      <div style="display:flex;align-items:center;gap:8px;${usedExpCurs.length>0?'margin-bottom:12px;':''}">
        <span style="font-size:13px;color:var(--t2);flex-shrink:0;">結算幣別</span>
        <select class="input" style="height:36px;font-size:13px;flex:1;" onchange="App._settleCur=this.value;App.renderTab();">
          ${allCurs.map(cur=>`<option value="${cur}"${dispCur===cur?' selected':''}>${cur} ${(C[cur]||{}).sym||''}</option>`).join('')}
        </select>
      </div>
      ${usedExpCurs.length>0?`${rateRows}<div style="margin-top:8px;text-align:right;"><button type="button" onclick="App.go('rates')" style="font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;">修改匯率 →</button></div>`:''}
    </div>`;

    // ── FUND CARD ──────────────────────────────────
    const fundMember=t.members.find(m=>m.isGroupFund);
    const fundCard=(()=>{
      if(!fundMember) return '';
      const deps=t.fundDeposits||[];
      const baseCur=t.baseCurrency||'TWD';
      const bSym=(C[baseCur]||C.TWD).sym;
      const totalInBase=deps.reduce((s,d)=>s+toBase(d.amt,d.cur||baseCur,t.rates,baseCur),0);
      const fundExps=Object.values(t.expenses||{}).filter(e=>{
        if(typeof e.paidBy==='string') return e.paidBy===fundMember.id;
        return e.paidBy?.[fundMember.id]>0;
      });
      const totalOutBase=fundExps.reduce((s,e)=>s+toBase(e.note==='金額待補'?0:e.amount,e.currency,t.rates,baseCur),0);
      const remainBase=totalInBase-totalOutBase;
      const regular=t.members.filter(m=>!m.isGroupFund);
      const perPerson=regular.length>0?remainBase/regular.length:0;
      // 找主要幣別（存入紀錄中出現最多的非基礎幣別）
      const depCurs=deps.map(d=>d.cur||baseCur).filter(c=>c!==baseCur);
      const localCur=depCurs.length>0
        ?depCurs.sort((a,b)=>depCurs.filter(c=>c===b).length-depCurs.filter(c=>c===a).length)[0]
        :baseCur;
      const localRate=localCur===baseCur?1:(t.rates[localCur]||DEF[localCur]||1);
      const toLocal=twdAmt=>twdAmt/localRate;
      const localSym=C[localCur]?.sym||'';
      const fmtLocal=v=>{const r=parseFloat(Math.abs(toLocal(v)).toFixed(3));const n=r.toLocaleString(undefined,{maximumFractionDigits:3});return localSym?`${localSym}${n}`:`${n} ${localCur}`;};
      const fmtBase=v=>`${bSym}${Math.round(Math.abs(v)).toLocaleString()}`;
      const showBase=localCur!==baseCur;
      const isExpanded=!!this._fundCardExpanded;
      const chevron=`<svg width="12" height="12" viewBox="0 0 10 10" style="margin-left:4px;vertical-align:middle;transition:transform .2s;transform:${isExpanded?'rotate(180deg)':'rotate(0)'}"><path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>`;
      const depRows=deps.map(d=>{
        const dCur=d.cur||baseCur;
        const dSym=C[dCur]?.sym||'';
        const dLabel=dSym?`${dSym}${Number(d.amt).toLocaleString()}`:`${Number(d.amt).toLocaleString()} ${dCur}`;
        const isEditFund=!!this._editingFundDeposits;
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;">
          <span style="color:var(--t2);">${d.date||''} ${d.note?`· ${d.note}`:''} <span style="background:#EEF2FF;color:var(--accent);border-radius:999px;padding:1px 6px;font-size:10px;">${t.members.find(m=>m.id===d.fromMemberId)?.name||d.fromMemberId}</span></span>
          <div style="display:flex;align-items:center;gap:6px;">
            <span style="font-weight:600;color:var(--t1);">+${dLabel}</span>
            ${isEditFund?`<button onclick="event.stopPropagation();App.openFundDeposit('${d.id}')" style="background:#EEF2FF;border:none;border-radius:50%;width:18px;height:18px;cursor:pointer;color:var(--accent);font-size:12px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;">✎</button><button onclick="event.stopPropagation();App.deleteFundDeposit('${d.id}')" style="background:#FEE2E2;border:none;border-radius:50%;width:18px;height:18px;cursor:pointer;color:#EF4444;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;">×</button>`:''}
          </div>
        </div>`;
      }).join('');
      const isEditFund=!!this._editingFundDeposits;
      const mergedRows=regular.map(m=>{
        const mDeps=deps.filter(d=>d.fromMemberId===m.id);
        const mBaseTotal=mDeps.reduce((s,d)=>s+toBase(d.amt,d.cur||baseCur,t.rates,baseCur),0);
        const subRows=isEditFund?mDeps.map(d=>`
          <div style="padding:4px 0 4px 8px;font-size:11px;color:var(--t2);">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:6px;">
              <span>${d.date||''}</span>
              <div style="display:flex;align-items:center;gap:5px;flex-shrink:0;">
                <span>+${fmtCur(d.amt,d.cur||baseCur)}</span>
                <button onclick="event.stopPropagation();App.openFundDeposit('${d.id}')" style="background:#EEF2FF;border:none;border-radius:50%;width:16px;height:16px;cursor:pointer;color:var(--accent);font-size:11px;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;">✎</button>
                <button onclick="event.stopPropagation();App.deleteFundDeposit('${d.id}')" style="background:#FEE2E2;border:none;border-radius:50%;width:16px;height:16px;cursor:pointer;color:#EF4444;font-size:13px;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;">×</button>
              </div>
            </div>
            ${d.note?`<div style="color:var(--t2);margin-top:1px;">${d.note}</div>`:''}
          </div>`).join(''):'';
        return `<div style="padding:6px 0;border-bottom:1px solid var(--border);">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;font-size:12px;">
            <span style="font-weight:600;line-height:1.6;">${m.name}</span>
            <div style="text-align:right;">
              <span style="font-weight:600;color:var(--t1);">${mDeps.length?fmtLocal(mBaseTotal):'—'}</span>
              ${showBase&&mDeps.length?`<div style="font-size:10px;color:var(--t2);">≈ ${fmtBase(mBaseTotal)}</div>`:''}
            </div>
          </div>
          ${subRows}
        </div>`;
      }).join('');
      const detail=isExpanded?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:12px;">
          <span style="color:var(--t2);">每人存入紀錄</span>
          ${deps.length>0?`<button onclick="event.stopPropagation();App._editingFundDeposits=!App._editingFundDeposits;App.renderTab();" style="font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid var(--border);background:${isEditFund?'var(--accent)':'transparent'};color:${isEditFund?'#fff':'var(--t2)'};cursor:pointer;">${isEditFund?'完成':'明細／編輯'}</button>`:''}
        </div>
        ${regular.length?mergedRows:`<div style="font-size:12px;color:var(--t2);text-align:center;padding:8px 0;">尚無存入紀錄</div>`}
        <button onclick="event.stopPropagation();App.openFundDeposit()" style="width:100%;margin-top:12px;padding:8px;border-radius:10px;border:1.5px dashed var(--accent);background:none;color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;">＋ 存入公款</button>
      </div>`:'';
      return `<div class="card" style="padding:14px 16px;margin-bottom:16px;border:1.5px solid #A5B4FC;">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;cursor:pointer;" onclick="App._fundCardExpanded=!App._fundCardExpanded;App._editingFundDeposits=false;App.renderTab();">
          <span style="font-size:18px;">💰</span>
          <span style="font-weight:700;font-size:15px;">${fundMember.name} ${chevron}</span>
        </div>
        <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px;">
          <span style="font-size:20px;font-weight:800;color:${remainBase>=0?'#22c55e':'#EF4444'};">餘額</span>
          <span style="font-size:20px;font-weight:800;color:${remainBase>=0?'#22c55e':'#EF4444'};white-space:nowrap;">${remainBase>=0?'':'-'}${fmtLocal(remainBase)}</span>
          ${showBase?`<span style="font-size:11px;color:var(--t2);white-space:nowrap;">≈ ${remainBase>=0?'':'-'}${fmtBase(remainBase)}</span>`:''}
        </div>
        <div style="height:1px;background:var(--border);margin-bottom:6px;"></div>
        <div style="font-size:11px;color:var(--t2);display:grid;grid-template-columns:max-content max-content${showBase?' auto':''};gap:2px 8px;">
          <span>總投入</span><span style="text-align:right;">${fmtLocal(totalInBase)}</span>${showBase?`<span>(${fmtBase(totalInBase)})</span>`:''}
          <span>已支出</span><span style="text-align:right;">${fmtLocal(totalOutBase)}</span>${showBase?`<span>(${fmtBase(totalOutBase)})</span>`:''}
        </div>
        ${detail}
      </div>`;
    })();

    // 同伴債務：只計算非公款帳支付的費用，避免 minimizeTx 把 peer debt 繞道公款帳
    const peerBal={};
    t.members.filter(m=>!m.isGroupFund).forEach(m=>{peerBal[m.id]=0;});
    Object.values(t.expenses||{}).forEach(e=>{
      const paidByFund=fundMember&&typeof e.paidBy==='string'&&e.paidBy===fundMember.id;
      if(paidByFund) return;
      const tot=toBase(e.amount,e.currency,t.rates,t.baseCurrency);
      if(typeof e.paidBy==='object'&&e.paidBy!==null){
        Object.entries(e.paidBy).forEach(([id,paid])=>{const pb=toBase(paid,e.currency,t.rates,t.baseCurrency);if(peerBal[id]!==undefined)peerBal[id]+=pb;});
      } else {
        if(peerBal[e.paidBy]!==undefined) peerBal[e.paidBy]+=tot;
      }
      const ps=(e.parts||t.members.map(m=>m.id)).filter(id=>peerBal[id]!==undefined);
      if(ps.length===0) return;
      if((e.splitMode==='custom'||e.splitMode==='proportion')&&e.customAmounts){
        ps.forEach(p=>{const ca=toBase(e.customAmounts[p]||0,e.currency,t.rates,t.baseCurrency);if(peerBal[p]!==undefined)peerBal[p]-=ca;});
      } else {
        const sh=tot/ps.length;
        ps.forEach(p=>{if(peerBal[p]!==undefined)peerBal[p]-=sh;});
      }
    });
    const peerTxs=minimizeTx(peerBal);
    // 公款債務：每個成員對公款帳的原始欠款，扣掉存款 + 轉帳，只保留未結清的
    const fundTxs=[];
    if(fundMember){
      const fundOwed={};
      t.members.filter(m=>!m.isGroupFund).forEach(m=>{fundOwed[m.id]=0;});
      Object.values(t.expenses||{}).forEach(e=>{
        if(typeof e.paidBy!=='string'||e.paidBy!==fundMember.id) return;
        const tot=toBase(e.amount,e.currency,t.rates,t.baseCurrency);
        const ps=(e.parts||t.members.map(m=>m.id)).filter(id=>fundOwed[id]!==undefined);
        if(ps.length===0) return;
        if((e.splitMode==='custom'||e.splitMode==='proportion')&&e.customAmounts){
          ps.forEach(p=>{const ca=toBase(e.customAmounts[p]||0,e.currency,t.rates,t.baseCurrency);if(fundOwed[p]!==undefined)fundOwed[p]+=ca;});
        } else {
          const sh=tot/ps.length;
          ps.forEach(p=>{if(fundOwed[p]!==undefined)fundOwed[p]+=sh;});
        }
      });
      t.members.filter(m=>!m.isGroupFund).forEach(m=>{
        const rawOwed=fundOwed[m.id]||0;
        if(rawOwed<0.5) return;
        const deposited=(t.fundDeposits||[]).filter(d=>d.fromMemberId===m.id)
          .reduce((s,d)=>s+toBase(d.amt,d.cur||t.baseCurrency||'TWD',t.rates,t.baseCurrency),0);
        const prPaid=payRecs.filter(r=>r.from===m.id&&r.to===fundMember.id)
          .reduce((s,r)=>s+toBase(r.amt,r.cur||t.baseCurrency||'TWD',t.rates,t.baseCurrency),0);
        if(rawOwed-deposited-prPaid>0.5) fundTxs.push({from:m.id,to:fundMember.id,amt:rawOwed});
      });
    }
    const origTxs=[...peerTxs,...fundTxs];
    const debtCards=origTxs.map((ot,di)=>{
      const matched=payRecs.filter(r=>r.from===ot.from&&r.to===ot.to);
      let paidBase=matched.reduce((s,r)=>s+toBase(r.amt,r.cur||t.baseCurrency||'TWD',t.rates,t.baseCurrency),0);
      if(fundMember&&ot.to===fundMember.id){
        (t.fundDeposits||[]).filter(d=>d.fromMemberId===ot.from).forEach(d=>{
          paidBase+=toBase(d.amt,d.cur||t.baseCurrency||'TWD',t.rates,t.baseCurrency);
        });
      }
      const remainBase=ot.amt-paidBase;
      const isSettled=remainBase<=0.5;
      const isExp=!!this._expandedDebt[di];
      const chevron=`<svg width="12" height="12" viewBox="0 0 10 10" style="margin-left:4px;vertical-align:middle;transition:transform .2s;transform:${isExp?'rotate(180deg)':'rotate(0)'};flex-shrink:0;"><path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>`;
      const amtDisplay=isSettled
        ?`<div style="display:flex;align-items:center;gap:4px;font-size:14px;font-weight:600;color:var(--t2);white-space:nowrap;">✓ 已結清${chevron}</div>`
        :`<div style="display:flex;align-items:center;font-size:18px;font-weight:800;color:var(--primary);white-space:nowrap;">${fmtS(remainBase)}${chevron}</div>`;
      const isEditing=!!this._editingDebt[di];
      const detail=isExp?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--t2);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <span>原始欠款</span>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="color:var(--t1);font-weight:600;">${fmtS(ot.amt)}</span>
            ${matched.length>0?`<button onclick="event.stopPropagation();App.toggleDebtEdit(${di})" style="font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid var(--border);background:${isEditing?'var(--accent)':'transparent'};color:${isEditing?'#fff':'var(--t2)'};cursor:pointer;">${isEditing?'完成':'編輯'}</button>`:''}
          </div>
        </div>
        ${matched.map((r,ri)=>`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
          <span>${r.date||''}${r.note?` · ${r.note}`:''}</span>
          <div style="display:flex;align-items:center;gap:6px;">
            <span style="color:#22c55e;font-weight:600;">−${fmtCur(Math.round(r.amt),r.cur||t.baseCurrency)}</span>
            ${isEditing?`<button onclick="event.stopPropagation();App.deletePayRecord(${payRecs.indexOf(r)})" style="background:#FEE2E2;border:none;border-radius:50%;width:18px;height:18px;cursor:pointer;color:#EF4444;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;">×</button>`:''}
          </div>
        </div>`).join('')}
        <div style="display:flex;justify-content:space-between;padding-top:6px;border-top:1px solid var(--border);font-weight:700;margin-bottom:8px;">
          <span style="color:var(--t1);">${isSettled?'已全數結清':'剩餘'}</span>
          <span style="color:${isSettled?'#22c55e':'var(--primary)'};">${isSettled?'—':fmtS(remainBase)}</span>
        </div>
        ${isSettled?'':`<button onclick="event.stopPropagation();App.openAddPayRecord('${ot.from}','${ot.to}')" style="width:100%;padding:8px;border-radius:10px;border:1.5px dashed var(--accent);background:none;color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;">＋ 記錄付款</button>`}
      </div>`:'';
      return `<div class="card" style="padding:14px 16px;margin-bottom:10px;${isSettled?'opacity:0.75;':''}">
        <div style="display:flex;align-items:center;gap:10px;cursor:pointer;" onclick="App.toggleDebtExpand(${di})">
          <div class="avatar" style="${avStyle(t,ot.from)}">${avText(mName(ot.from))}</div>
          <div class="flex-1 min-w-0" style="display:flex;align-items:center;gap:4px;">
            <div style="flex:1;min-width:0;text-align:right;font-weight:700;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${mName(ot.from)}</div>
            <div style="flex-shrink:0;color:var(--t2);font-size:15px;padding:0 2px;">→</div>
            <div style="flex:1;min-width:0;font-weight:700;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${mName(ot.to)}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
            <div class="avatar" style="${avStyle(t,ot.to)}">${avText(mName(ot.to))}</div>
            ${amtDisplay}
          </div>
        </div>
        ${detail}
      </div>`;
    }).join('');
    const txHtml=origTxs.length===0
      ?(hasExps
        ?`<div class="empty"><div class="empty-icon">🎉</div><div class="empty-title">大家都平帳了！</div><div class="empty-sub">旅行的帳順利結清</div></div>`
        :`<div class="card" style="padding:16px;text-align:center;color:var(--t2);font-size:14px;">還沒有支出記錄，先到支出頁新增費用</div>`)
      :debtCards;

    const balRows=t.members.map(m=>{
      const v=adjBal[m.id]||0;
      let cls,lbl;
      if(v>0.5){cls='receive';lbl=`應收 ${fmtS(v)}`;}
      else if(v<-0.5){cls='owe';lbl=`應付 ${fmtS(-v)}`;}
      else{cls='ok';lbl='已平帳 ✓';}
      return `<div class="card member-row">
        <div class="avatar" style="${avStyle(t,m.id)}">${avText(m.name)}</div>
        <div class="flex-1 semibold">${m.name}</div>
        <div class="${cls} bold" style="font-size:14px;">${lbl}</div>
      </div>`;
    }).join('');

    // Member expense summary
    const memberSummary=(()=>{
      if(!hasExps) return '';
      const spent={}, paid={};
      const inclPersonal=this._summaryIncludePersonal;
      const selfSpent={}, groupFundSpent={}, groupPeerSpent={};
      t.members.forEach(m=>{spent[m.id]=0;paid[m.id]=0;selfSpent[m.id]=0;groupFundSpent[m.id]=0;groupPeerSpent[m.id]=0;});
      Object.values(t.expenses||{}).forEach(e=>{
        const isSelf=e.splitMode==='self';
        if(isSelf&&!inclPersonal) return;
        const tot=toBase(e.note==='金額待補'?0:e.amount,e.currency,t.rates,t.baseCurrency);
        if(isSelf){
          const pid=typeof e.paidBy==='object'?Object.keys(e.paidBy)[0]:e.paidBy;
          if(selfSpent[pid]!==undefined) selfSpent[pid]+=tot;
          if(spent[pid]!==undefined) spent[pid]+=tot;
        } else {
          const ps=e.parts||t.members.map(m=>m.id);
          const isFundPaid=fundMember&&typeof e.paidBy==='string'&&e.paidBy===fundMember.id;
          // paid
          if(typeof e.paidBy==='object'&&e.paidBy!==null){
            Object.entries(e.paidBy).forEach(([id,v])=>{if(paid[id]!==undefined) paid[id]+=toBase(v,e.currency,t.rates,t.baseCurrency);});
          } else {
            if(paid[e.paidBy]!==undefined) paid[e.paidBy]+=tot;
          }
          // spent (share) + fund/peer split
          if((e.splitMode==='custom'||e.splitMode==='proportion')&&e.customAmounts){
            ps.forEach(p=>{
              const sh=toBase(e.customAmounts[p]||0,e.currency,t.rates,t.baseCurrency);
              if(spent[p]!==undefined) spent[p]+=sh;
              if(isFundPaid){if(groupFundSpent[p]!==undefined)groupFundSpent[p]+=sh;}
              else{if(groupPeerSpent[p]!==undefined)groupPeerSpent[p]+=sh;}
            });
          } else {
            const sh=tot/ps.length;
            ps.forEach(p=>{
              if(spent[p]!==undefined) spent[p]+=sh;
              if(isFundPaid){if(groupFundSpent[p]!==undefined)groupFundSpent[p]+=sh;}
              else{if(groupPeerSpent[p]!==undefined)groupPeerSpent[p]+=sh;}
            });
          }
        }
      });
      const groupTotal=Object.values(t.expenses||{}).filter(e=>inclPersonal||e.splitMode!=='self').reduce((s,e)=>s+toBase(e.note==='金額待補'?0:e.amount,e.currency,t.rates,t.baseCurrency),0);
      // fund deposits per member (已付公費)
      const fundPaid={};
      t.members.forEach(m=>{fundPaid[m.id]=0;});
      (t.fundDeposits||[]).forEach(d=>{
        const a=toBase(d.amt,d.cur||t.baseCurrency||'TWD',t.rates,t.baseCurrency);
        if(fundPaid[d.fromMemberId]!==undefined) fundPaid[d.fromMemberId]+=a;
      });
      // transfer payments per member
      const outPay={};
      t.members.forEach(m=>{outPay[m.id]=0;});
      payRecs.forEach(r=>{
        const a=toBase(r.amt,r.cur||t.baseCurrency||'TWD',t.rates,t.baseCurrency);
        if(outPay[r.from]!==undefined) outPay[r.from]+=a;
      });
      // hasPeerExps：是否有非公款帳支付的群組費用
      const hasPeerExps=Object.values(t.expenses||{}).some(e=>{
        if(e.splitMode==='self') return false;
        if(!fundMember) return true;
        if(typeof e.paidBy==='string') return e.paidBy!==fundMember.id;
        return true;
      });
      // adjPeerBal：僅同伴費用 balance，加上轉帳紀錄調整，用於應付/應收
      const adjPeerBal={...peerBal};
      payRecs.forEach(r=>{
        const a=toBase(r.amt,r.cur||t.baseCurrency||'TWD',t.rates,t.baseCurrency);
        if(adjPeerBal[r.from]!==undefined) adjPeerBal[r.from]+=a;
        if(adjPeerBal[r.to]!==undefined) adjPeerBal[r.to]-=a;
      });
      const rows=t.members.filter(m=>!m.isGroupFund).map(m=>{
        const sp=spent[m.id]||0;
        const pd=paid[m.id]||0;
        const isExp=!!this._expandedMemberSummary[m.id];
        const chevron=`<svg width="10" height="10" viewBox="0 0 10 10" style="margin-left:4px;vertical-align:middle;transition:transform .2s;transform:${isExp?'rotate(180deg)':'rotate(0deg)'};"><path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>`;
        const fp=fundPaid[m.id]||0;
        const tp=outPay[m.id]||0;
        const peerAdj=adjPeerBal[m.id]||0;
        const collectLine=!hasPeerExps?''
          :peerAdj<-0.5
            ?`<div style="font-size:12px;color:#EF4444;">應付 ${fmtS(-peerAdj)}</div>`
            :peerAdj>0.5
              ?`<div style="font-size:12px;color:#22c55e;">應收 ${fmtS(peerAdj)}</div>`
              :`<div style="font-size:12px;color:var(--t2);">已平帳 ✓</div>`;
        const alwaysLines=collectLine?`<div style="margin-top:3px;">${collectLine}</div>`:'';
        const rStyle='font-size:12px;color:var(--t2);display:flex;justify-content:space-between;gap:12px;';
        const div='<div style="border-top:1px solid var(--border);margin:4px 0;"></div>';
        const fsp=groupFundSpent[m.id]||0;
        const psp=groupPeerSpent[m.id]||0;
        const personalSp=selfSpent[m.id]||0;
        const expandedRows=isExp?`
          <div style="margin-top:4px;">
          ${fundMember
            ?`${psp>0.5?`<div style="${rStyle}"><span>群組花費－一般支出</span><span>${fmtS(psp)}</span></div>`:''}
               ${fsp>0.5?`<div style="${rStyle}"><span>群組花費－公費支出</span><span>${fmtS(fsp)}</span></div>`:''}`
            :`<div style="${rStyle}"><span>群組花費</span><span>${fmtS(psp)}</span></div>`}
          ${inclPersonal?`<div style="${rStyle}"><span>個人花費</span><span>${fmtS(personalSp)}</span></div>`:''}
          ${fp>0.5?`${div}<div style="${rStyle}"><span>已付公費</span><span>${fmtS(fp)}</span></div>`:''}
          ${div}<div style="${rStyle}"><span>支出已付</span><span>${fmtS(pd)}</span></div>${tp>0.5?`<div style="${rStyle}"><span>轉帳已付</span><span>${fmtS(tp)}</span></div>`:''}
          </div>`:'';
        return `<div style="display:flex;align-items:${isExp?'flex-start':'center'};gap:10px;padding:10px 0;border-bottom:1px solid var(--border);">
          <div class="avatar" style="${avStyle(t,m.id)};${isExp?'margin-top:2px;':''}">${avText(m.name)}</div>
          <div style="flex:1;min-width:0;${isExp?'padding-top:2px;':''}">
            <div class="base semibold">${m.name}</div>
          </div>
          <div style="text-align:right;flex-shrink:0;">
            <div style="font-size:15px;font-weight:700;display:inline-flex;align-items:center;cursor:pointer;" onclick="App.toggleMemberExpand('${m.id}')">總花費 ${fmtS(sp)}${chevron}</div>
            ${expandedRows}
            ${alwaysLines}
          </div>
        </div>`;
      }).join('');
      const toggle=`<button type="button" onclick="App._summaryIncludePersonal=!App._summaryIncludePersonal;App.renderTab();" style="width:36px;height:20px;border-radius:999px;background:${inclPersonal?'var(--accent)':'#D1D5DB'};position:relative;border:none;cursor:pointer;padding:0;flex-shrink:0;"><div style="width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:2px;${inclPersonal?'right:2px':'left:2px'};transition:all .2s;"></div></button>`;
      return `<div style="height:20px;"></div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
          <div class="sm semibold muted" style="flex:1;">成員花費與墊付總覽</div>
          <span style="font-size:12px;color:var(--t2);">含個人支出</span>
          ${toggle}
        </div>
        <div class="card" style="padding:4px 16px;">
          ${rows}
          <div style="display:flex;align-items:center;gap:10px;padding:12px 0;padding-bottom:4px;">
            <div style="font-size:13px;color:var(--t2);flex:1;">${inclPersonal?'全部合計':'群組合計'}</div>
            <div style="font-size:16px;font-weight:800;">${fmtS(groupTotal)}</div>
          </div>
        </div>
        ${fundMember?`<div style="font-size:11px;color:var(--t2);margin-top:6px;padding:0 4px;">＊ 應付／應收 不含公款存入金額，公款餘額請見上方卡片</div>`:''}`;

    })();

    const payRecords=t.payRecords||[];
    const payRecordCard=`
      <div class="sm semibold muted mb3">轉帳結清紀錄</div>
      <div class="card" style="padding:16px;margin-bottom:20px;">
        ${payRecords.length===0
          ?`<div style="text-align:center;padding:8px 0;">
              <div style="font-size:13px;color:var(--t2);line-height:1.8;">目前尚無轉帳紀錄<br>請大家確認下方債務關係，盡快匯款並記錄</div>
              <button type="button" onclick="App.openAddPayRecord()" style="margin-top:12px;font-size:13px;font-weight:600;color:var(--accent);background:none;border:1.5px solid var(--accent);border-radius:999px;padding:6px 16px;cursor:pointer;">＋ 新增轉帳紀錄</button>
            </div>`
          :`${payRecords.map((r,i)=>`
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">
              <div class="avatar" style="${avStyle(t,r.from)}">${avText(mName(r.from))}</div>
              <div style="flex:1;min-width:0;">
                <div style="font-size:14px;font-weight:600;">${mName(r.from)} → ${mName(r.to)}</div>
                <div style="font-size:12px;color:var(--t2);">${r.date||''} ${r.note||''}${r.remark?` · ${r.remark}`:''}</div>
              </div>
              <div style="font-size:15px;font-weight:700;color:var(--primary);">${fmtS(r.amt)}</div>
              <button onclick="App.deletePayRecord(${i})" style="background:none;border:none;cursor:pointer;padding:0 4px;display:flex;align-items:center;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--t2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
            </div>`).join('')}
          <button type="button" onclick="App.openAddPayRecord()" style="margin-top:12px;font-size:13px;font-weight:600;color:var(--accent);background:none;border:1.5px solid var(--accent);border-radius:999px;padding:6px 16px;cursor:pointer;width:100%;">＋ 新增轉帳紀錄</button>`}
      </div>`;

    const pendingExps=Object.values(t.expenses||{}).filter(e=>e.note==='金額待補');
    const pendingBanner=pendingExps.length>0
      ?`<div style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:#FFF7ED;border:1.5px solid #FED7AA;border-radius:12px;margin-bottom:14px;">
          <span style="font-size:18px;flex-shrink:0;">⚠️</span>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:700;color:#C2410C;">有 ${pendingExps.length} 筆支出費用尚未補金額</div>
            <div style="font-size:12px;color:#EA580C;margin-top:2px;">結算數字可能不準確，建議補完後再結清</div>
          </div>
          <button onclick="App.tab='expenses';App._filterPending=true;App._filterCat=null;App.renderTab();" style="font-size:12px;color:#EA580C;background:none;border:1.5px solid #FDBA74;border-radius:8px;padding:4px 10px;cursor:pointer;white-space:nowrap;">去補填</button>
        </div>`
      :'';
    c.innerHTML=`
      ${pendingBanner}
      ${curSelect}
      ${fundCard}
      ${payRecordCard}
      <div class="sm semibold muted mb3">債務關係</div>
      ${txHtml}
      ${memberSummary}
      <div style="display:flex;align-items:center;gap:10px;padding:56px 16px 80px;"><div style="flex:1;height:1px;background:linear-gradient(to right,transparent,var(--border));"></div><span style="color:var(--border);font-size:10px;flex-shrink:0;">◆</span><div style="flex:1;height:1px;background:linear-gradient(to left,transparent,var(--border));"></div></div>
      `;
  },

  toggleMemberExpand(mid){this._expandedMemberSummary[mid]=!this._expandedMemberSummary[mid];this.renderTab();},
  toggleDebtExpand(i){this._expandedDebt[i]=!this._expandedDebt[i];if(!this._expandedDebt[i])this._editingDebt[i]=false;this.renderTab();},
  toggleDebtEdit(i){this._editingDebt[i]=!this._editingDebt[i];this.renderTab();},
  togglePayNote(opt){
    const inp=document.getElementById('pay-rec-note');
    if(!inp) return;
    const allOpts=['LINE Pay','現金','銀行轉帳','其他'];
    const isOn=inp.value===opt;
    allOpts.forEach(o=>{
      const b=document.getElementById(`pay-note-${o}`);
      if(!b) return;
      b.style.background='#fff'; b.style.color='var(--t1)'; b.style.borderColor='var(--border)';
    });
    if(!isOn){
      const btn=document.getElementById(`pay-note-${opt}`);
      if(btn){btn.style.background='var(--accent)';btn.style.color='#fff';btn.style.borderColor='var(--accent)';}
      inp.value=opt;
    } else {
      inp.value='';
    }
  },
  openAddPayRecord(fromId,toId){
    const t=loadTrip(this.tripId); if(!t) return;
    const opts=t.members.map(m=>`<option value="${m.id}">${m.name}</option>`).join('');
    document.getElementById('pay-rec-from').innerHTML=opts;
    document.getElementById('pay-rec-to').innerHTML=opts;
    if(fromId) document.getElementById('pay-rec-from').value=fromId;
    if(toId) document.getElementById('pay-rec-to').value=toId;
    document.getElementById('pay-rec-amt').value='';
    document.getElementById('pay-rec-note').value='';
    document.getElementById('pay-rec-remark').value='';
    ['LINE Pay','現金','銀行轉帳','其他'].forEach(o=>{
      const b=document.getElementById(`pay-note-${o}`);
      if(b){b.style.background='#fff';b.style.color='var(--t1)';b.style.borderColor='var(--border)';}
    });
    const now=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Taipei'}));
    const today=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    document.getElementById('pay-rec-date').value=today;
    const settleCur=this._settleCur||t.baseCurrency||'TWD';
    const allCurs=[...new Set([...Object.keys(t.rates||{}), ...Object.keys(DEF), settleCur])];
    const curSel=document.getElementById('pay-rec-cur');
    if(curSel){
      curSel.innerHTML=allCurs.map(c=>`<option value="${c}" ${c===settleCur?'selected':''}>${c}</option>`).join('');
    }
    this.openModal('m-pay-record');
  },
  savePayRecord(){
    const t=loadTrip(this.tripId); if(!t) return;
    const from=document.getElementById('pay-rec-from').value;
    const to=document.getElementById('pay-rec-to').value;
    const cur=document.getElementById('pay-rec-cur')?.value||t.baseCurrency||'TWD';
    const amt=parseFloat(document.getElementById('pay-rec-amt').value.replace(/,/g,''));
    const note=document.getElementById('pay-rec-note').value.trim();
    const remark=document.getElementById('pay-rec-remark').value.trim();
    const date=document.getElementById('pay-rec-date').value;
    const method=document.getElementById('pay-rec-note').value.trim();
    if(!from||!to||!amt||from===to){this.showToast('請確認付款人、收款人不同且金額正確');return;}
    if(!method){this.showToast('請選擇付款方式');return;}
    if(!t.payRecords) t.payRecords=[];
    t.payRecords.push({from,to,amt,cur,note,remark,date});
    saveTrip(t); this.closeModal('m-pay-record'); this.renderTab();
    // 檢查是否全部結清
    const bal2=calcBal(t);
    const adjBal2={...bal2};
    t.payRecords.forEach(r=>{
      const a=toBase(r.amt,r.cur||t.baseCurrency||'TWD',t.rates,t.baseCurrency);
      if(adjBal2[r.from]!==undefined) adjBal2[r.from]+=a;
      if(adjBal2[r.to]!==undefined) adjBal2[r.to]-=a;
    });
    const origTxs2=minimizeTx(bal2);
    const hasPending2=Object.values(t.expenses||{}).some(e=>e.note==='金額待補');
    if(origTxs2.length>0&&!hasPending2){
      const allDone=origTxs2.every(ot=>{
        const paid=t.payRecords.filter(r=>r.from===ot.from&&r.to===ot.to)
          .reduce((p,r)=>p+toBase(r.amt,r.cur||t.baseCurrency||'TWD',t.rates,t.baseCurrency),0);
        return (ot.amt-paid)<=0.5;
      });
      if(allDone) setTimeout(()=>this.showConfetti(),400);
    }
  },
  deletePayRecord(i){
    const t=loadTrip(this.tripId); if(!t) return;
    t.payRecords=(t.payRecords||[]).filter((_,idx)=>idx!==i);
    saveTrip(t); this.renderTab();
  },
  markSettled(){this.showConfetti(); this.showToast('🎉 已標記為全部結清！');},

  showConfetti(){
    const w=document.getElementById('confetti');
    w.classList.add('show'); w.innerHTML='';
    const clrs=['#5B6CFF','#FF6B6B','#FFD93D','#A78BFA','#4D96FF','#34D399','#F97316','#EC4899','#FFF','#06B6D4'];
    for(let i=0;i<300;i++){
      const el=document.createElement('div');
      const x=Math.random()*110-5, d=Math.random()*1.4, sz=Math.random()*10+4;
      const clr=clrs[Math.floor(Math.random()*clrs.length)];
      const shape=Math.random()>.6?'50%':Math.random()>.5?'2px':'0';
      el.style.cssText=`position:absolute;left:${x}%;top:-12px;width:${sz}px;height:${sz*(0.35+Math.random()*0.8)}px;background:${clr};border-radius:${shape};animation:fall ${1.2+Math.random()*1.8}s ${d}s ease-in forwards;transform:rotate(${Math.random()*360}deg);`;
      w.appendChild(el);
    }
    const msg=document.createElement('div');
    msg.style.cssText='position:absolute;top:42%;left:50%;text-align:center;background:rgba(20,20,30,.75);backdrop-filter:blur(6px);padding:20px 32px;border-radius:20px;animation:msgBounce .7s .2s both;';
    msg.innerHTML='<div style="font-size:22px;font-weight:800;color:#fff;white-space:nowrap;letter-spacing:.5px;">帳款已結清</div><div style="font-size:14px;color:rgba(255,255,255,.8);margin-top:6px;">期待下次旅行</div>';
    w.appendChild(msg);
    const st=document.createElement('style');
    st.textContent='@keyframes fall{to{transform:translateY(115vh) rotate(720deg);opacity:0;}} @keyframes msgBounce{0%{opacity:0;transform:translate(-50%,-50%) scale(.3);}55%{opacity:1;transform:translate(-50%,-50%) scale(1.12);}75%{transform:translate(-50%,-50%) scale(.94);}88%{transform:translate(-50%,-50%) scale(1.04);}100%{opacity:1;transform:translate(-50%,-50%) scale(1);}}';
    w.appendChild(st);
    setTimeout(()=>{msg.style.transition='opacity .4s,transform .4s';msg.style.opacity='0';msg.style.transform='translate(-50%,-54%) scale(.88)';},2400);
    setTimeout(()=>{w.classList.remove('show');w.innerHTML='';},3200);
  },

  // ── MEMBERS ───────────────────────────────────
  renderMembers(t,c){
    const payRecs=t.payRecords||[];
    const fundMember=t.members.find(m=>m.isGroupFund)||null;
    // Peer balance：只計算非公款帳費用，邏輯同結算頁
    const peerBal={};
    t.members.filter(m=>!m.isGroupFund).forEach(m=>{peerBal[m.id]=0;});
    Object.values(t.expenses||{}).forEach(e=>{
      const paidByFund=fundMember&&typeof e.paidBy==='string'&&e.paidBy===fundMember.id;
      if(paidByFund) return;
      const tot=toBase(e.note==='金額待補'?0:e.amount,e.currency,t.rates,t.baseCurrency);
      if(typeof e.paidBy==='object'&&e.paidBy!==null){
        Object.entries(e.paidBy).forEach(([id,paid])=>{const pb=toBase(paid,e.currency,t.rates,t.baseCurrency);if(peerBal[id]!==undefined)peerBal[id]+=pb;});
      } else {
        if(peerBal[e.paidBy]!==undefined) peerBal[e.paidBy]+=tot;
      }
      const ps=(e.parts||t.members.map(m=>m.id)).filter(id=>peerBal[id]!==undefined);
      if(ps.length===0) return;
      if((e.splitMode==='custom'||e.splitMode==='proportion')&&e.customAmounts){
        ps.forEach(p=>{const ca=toBase(e.customAmounts[p]||0,e.currency,t.rates,t.baseCurrency);if(peerBal[p]!==undefined)peerBal[p]-=ca;});
      } else {
        const sh=tot/ps.length;
        ps.forEach(p=>{if(peerBal[p]!==undefined)peerBal[p]-=sh;});
      }
    });
    payRecs.forEach(r=>{
      const a=toBase(r.amt,r.cur||t.baseCurrency||'TWD',t.rates,t.baseCurrency);
      if(peerBal[r.from]!==undefined) peerBal[r.from]+=a;
      if(peerBal[r.to]!==undefined) peerBal[r.to]-=a;
    });
    // 公款帳餘額
    let fundRemain=0;
    if(fundMember){
      const totalIn=(t.fundDeposits||[]).reduce((s,d)=>s+toBase(d.amt,d.cur||t.baseCurrency||'TWD',t.rates,t.baseCurrency),0);
      const totalOut=Object.values(t.expenses||{}).filter(e=>typeof e.paidBy==='string'&&e.paidBy===fundMember.id)
        .reduce((s,e)=>s+toBase(e.note==='金額待補'?0:e.amount,e.currency,t.rates,t.baseCurrency),0);
      fundRemain=totalIn-totalOut;
    }
    const eid=this._editingMember;
    const sorted=[...t.members].sort((a,b)=>(b.isGroupFund?1:0)-(a.isGroupFund?1:0));
    const rows=sorted.map(m=>{
      let v,cls,lbl;
      if(m.isGroupFund){
        v=fundRemain;
        if(v>0.5){cls='receive';lbl=`餘額 ${fmt(v,t.baseCurrency)}`;}
        else if(v<-0.5){cls='owe';lbl=`缺口 ${fmt(-v,t.baseCurrency)}`;}
        else{cls='ok';lbl='收支平衡 ✓';}
      } else {
        v=peerBal[m.id]||0;
        if(v>0.5){cls='receive';lbl=`應收 ${fmt(v,t.baseCurrency)}`;}
        else if(v<-0.5){cls='owe';lbl=`應付 ${fmt(-v,t.baseCurrency)}`;}
        else{cls='ok';lbl='已平帳 ✓';}
      }
      const isEditing=eid===m.id;
      const editPanel=isEditing?`<div style="border-top:1px solid var(--border);margin-top:10px;padding-top:10px;">
          <div class="xs muted mb2">選擇頭像顏色</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">
            ${AVATAR_COLORS.filter(c=>c.id===m.color||!t.members.some(om=>om.id!==m.id&&om.color===c.id)).map(c=>`<button type="button" onclick="App._editPickedColor='${c.id}';document.querySelectorAll('.edit-swatch').forEach(b=>b.style.outline=b.dataset.color==='${c.id}'?'2px solid var(--accent)':'none');" class="edit-swatch" data-color="${c.id}" style="width:28px;height:28px;border-radius:50%;background:${c.bg};border:none;cursor:pointer;outline:${(this._editPickedColor||m.color)===c.id?'2px solid var(--accent)':'none'};outline-offset:2px;"></button>`).join('')}
          </div>
          <div style="display:flex;gap:8px;align-items:center;">
            <input id="edit-name-${m.id}" class="input flex-1" value="${m.name}" maxlength="20"
              onkeydown="if(event.key==='Enter')App.saveRename('${m.id}');else if(event.key==='Escape'){App._editingMember=null;App.renderTab();}">
            <button type="button" class="btn btn-accent btn-sm" onclick="App.saveRename('${m.id}')">儲存</button>
            <button type="button" class="btn btn-ghost btn-sm" onclick="App._editingMember=null;App.renderTab();">取消</button>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">
            <div>
              <div style="font-size:13px;font-weight:600;color:var(--t1);">💰 設為公款帳戶</div>
              <div style="font-size:11px;color:var(--t2);margin-top:2px;">集中管理旅遊公共費用池</div>
            </div>
            <button type="button" onclick="App.toggleGroupFund('${m.id}')" style="width:46px;height:26px;border-radius:999px;border:none;cursor:pointer;background:${m.isGroupFund?'var(--accent)':'#D1D5DB'};transition:background .2s;position:relative;">
              <span style="position:absolute;top:3px;left:${m.isGroupFund?'23px':'3px'};width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);"></span>
            </button>
          </div>
        </div>`:'';
      return `<div class="card member-row" style="flex-direction:column;align-items:stretch;">
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="avatar" style="${avStyle(t,m.id)}">${avText(m.name)}</div>
          <div class="flex-1">
            <div class="base semibold">${m.name}${m.isGroupFund?` <span style="font-size:10px;background:#EEF2FF;color:var(--accent);border-radius:999px;padding:1px 7px;font-weight:600;vertical-align:middle;">💰</span>`:''}</div>
            ${lbl?`<div class="xs ${cls} mt1">${lbl}</div>`:''}
          </div>
          <button type="button" onclick="App.startRename('${m.id}')" style="background:none;border:none;cursor:pointer;color:${isEditing?'var(--accent)':'var(--t2)'};padding:4px;display:flex;align-items:center;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
          <button onclick="App.removeMember('${m.id}')" style="background:none;border:none;cursor:pointer;color:var(--t2);padding:4px;display:flex;align-items:center;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
        </div>
        ${editPanel}
      </div>`;
    }).join('');
    const usedColors=t.members.map(m=>m.color).filter(Boolean);
    const availColors=AVATAR_COLORS.filter(c=>!usedColors.includes(c.id));
    if(!this._pickedColor||usedColors.includes(this._pickedColor))
      this._pickedColor=availColors[0]?.id||'';
    const swatches=availColors.map(c=>`<button class="color-swatch${this._pickedColor===c.id?' picked':''}" data-color="${c.id}" style="background:${c.bg};" onclick="App.pickColor('${c.id}')"></button>`).join('');
    const llavC=AVATAR_COLORS.find(c=>c.id==='llav')||AVATAR_COLORS[AVATAR_COLORS.length-1];
    const addForm=this._showAddMember?`<div class="card" style="padding:16px;margin-top:4px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <label class="form-label" style="margin-bottom:0;">新增成員</label>
          <button type="button" onclick="App._showAddMember=false;App.renderTab();" style="background:none;border:none;cursor:pointer;color:var(--t2);font-size:18px;line-height:1;">×</button>
        </div>
        ${availColors.length>0?`<div class="xs muted mb2">選擇頭像顏色</div><div class="flex gap-2 mb3" style="flex-wrap:wrap;">${swatches}</div>`:''}
        <div class="flex gap-2" style="align-items:center;">
          <div class="avatar" style="background:${llavC.bg};color:${llavC.text};">A</div>
          <input id="in-member" class="input flex-1" placeholder="輸入名字" maxlength="20"
            onkeydown="if(event.key==='Enter')App.addMember()" oninput="App.previewMemberAvatar(this.value)">
          <button class="btn btn-accent" style="height:44px;padding:0 18px;" onclick="App.addMember()">新增</button>
        </div>
      </div>`:`<button type="button" onclick="App._showAddMember=true;App.renderTab();" class="btn btn-ghost btn-full" style="margin-top:4px;">＋ 新增成員</button>`;
    c.innerHTML=`
      <div class="sm semibold muted mb3">${t.members.length} 位成員</div>
      ${rows}
      ${addForm}
      <div style="height:16px;"></div>`;
  },

  pickColor(id){
    this._pickedColor=id;
    document.querySelectorAll('.color-swatch').forEach(el=>{
      el.classList.toggle('picked',el.dataset.color===id);
    });
    const ac=AVATAR_COLORS.find(c=>c.id===id);
    if(ac){
      const av=document.querySelector('#tab-content .avatar');
      if(av){av.style.background=ac.bg;av.style.color=ac.text;}
    }
  },

  previewMemberAvatar(val){
    const av=document.querySelector('#tab-content .avatar');
    if(av) av.textContent=val?val.slice(0,2):'?';
  },

  startRename(mid){
    if(this._editingMember===mid){this._editingMember=null;this.renderTab();return;}
    const t=loadTrip(this.tripId);
    const m=t?.members.find(m=>m.id===mid);
    this._editingMember=mid;
    this._editPickedColor=m?.color||'';
    this.renderTab();
    setTimeout(()=>document.getElementById(`edit-name-${mid}`)?.focus(),30);
  },
  saveRename(mid){
    const inp=document.getElementById(`edit-name-${mid}`);
    if(!inp) return;
    const newName=inp.value.trim();
    if(!newName){this.showToast('名字不能空白');return;}
    const t=loadTrip(this.tripId);
    if(!t) return;
    if(t.members.some(m=>m.id!==mid&&m.name===newName)){this.showToast('名字已存在');return;}
    const m=t.members.find(m=>m.id===mid);
    if(!m) return;
    m.name=newName;
    if(this._editPickedColor) m.color=this._editPickedColor;
    saveTrip(t);
    this._editingMember=null;
    this.renderTab();
    this.renderTrip();
    this.showToast('已更新');
  },
  toggleGroupFund(mid){
    const t=loadTrip(this.tripId); if(!t) return;
    t.members.forEach(m=>{if(m.id!==mid) m.isGroupFund=false;});
    const m=t.members.find(m=>m.id===mid);
    if(m){
      m.isGroupFund=!m.isGroupFund;
      if(m.isGroupFund){
        m.name='公款帳';
        const inp=document.getElementById(`edit-name-${mid}`);
        if(inp) inp.value='公款帳';
      }
    }
    saveTrip(t); this.renderTab(); this.renderTrip();
  },
  openFundDeposit(depId){
    const t=loadTrip(this.tripId); if(!t) return;
    const fund=t.members.find(m=>m.isGroupFund); if(!fund) return;
    const regular=t.members.filter(m=>!m.isGroupFund);
    const baseCur=t.baseCurrency||'TWD';
    const allCurs=[...new Set([baseCur,...Object.keys(t.rates||{}),...Object.keys(DEF)])];
    document.getElementById('fund-dep-cur').innerHTML=allCurs.map(c=>`<option value="${c}"${c===baseCur?' selected':''}>${c}</option>`).join('');
    const existing=depId?(t.fundDeposits||[]).find(d=>d.id===depId):null;
    // 成員勾選按鈕
    const membersEl=document.getElementById('fund-dep-members');
    membersEl.innerHTML=regular.map(m=>{
      const sel=existing?existing.fromMemberId===m.id:true;
      return `<button type="button" id="fdm-${m.id}" data-sel="${sel?'1':''}" onclick="App.toggleFundMember('${m.id}')"
        style="padding:6px 14px;border-radius:999px;border:1.5px solid ${sel?'var(--accent)':'var(--border)'};background:${sel?'var(--accent)':'#fff'};color:${sel?'#fff':'var(--t1)'};font-size:13px;font-weight:600;cursor:pointer;">${m.name}</button>`;
    }).join('');
    if(existing){
      document.getElementById('fund-dep-amt').value=existing.amt;
      document.getElementById('fund-dep-cur').value=existing.cur||baseCur;
      document.getElementById('fund-dep-date').value=existing.date||'';
      document.getElementById('fund-dep-note').value=existing.note||'';
    } else {
      document.getElementById('fund-dep-amt').value='';
      document.getElementById('fund-dep-note').value='';
      const now=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Taipei'}));
      document.getElementById('fund-dep-date').value=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    }
    this._editingDepId=depId||null;
    this.openModal('m-fund-deposit');
  },
  toggleFundMember(mid){
    const btn=document.getElementById(`fdm-${mid}`);
    if(!btn) return;
    const isNowSel=btn.dataset.sel!=='1';
    btn.dataset.sel=isNowSel?'1':'';
    btn.style.borderColor=isNowSel?'var(--accent)':'var(--border)';
    btn.style.background=isNowSel?'var(--accent)':'#fff';
    btn.style.color=isNowSel?'#fff':'var(--t1)';
  },
  saveFundDeposit(){
    const t=loadTrip(this.tripId); if(!t) return;
    const amt=parseFloat(document.getElementById('fund-dep-amt').value.replace(/,/g,''));
    const cur=document.getElementById('fund-dep-cur').value;
    const date=document.getElementById('fund-dep-date').value;
    const note=document.getElementById('fund-dep-note').value.trim();
    if(!amt||amt<=0){this.showToast('請填入金額');return;}
    if(!t.fundDeposits) t.fundDeposits=[];
    if(this._editingDepId){
      // 編輯模式：只改金額/幣別/日期/備註（存入者不變）
      const d=t.fundDeposits.find(d=>d.id===this._editingDepId);
      if(d){d.amt=amt;d.cur=cur;d.date=date;d.note=note;}
      const wasEditing=true;
      this._editingDepId=null;
      saveTrip(t); this.closeModal('m-fund-deposit'); this.renderTab();
      this.showToast('已更新');
    } else {
      // 新增模式：取得勾選的成員
      const fund=t.members.find(m=>m.isGroupFund);
      const regular=t.members.filter(m=>!m.isGroupFund);
      const selected=regular.filter(m=>{
        const btn=document.getElementById(`fdm-${m.id}`);
        return btn&&btn.dataset.sel==='1';
      });
      if(selected.length===0){this.showToast('請選擇存入者');return;}
      selected.forEach(m=>{
        t.fundDeposits.push({id:uid(),fromMemberId:m.id,amt,cur,date,note});
      });
      this._editingDepId=null;
      saveTrip(t); this.closeModal('m-fund-deposit'); this.renderTab();
      this.showToast(`已記錄 ${selected.length} 人存入`);
    }
  },
  deleteFundDeposit(depId){
    const t=loadTrip(this.tripId); if(!t) return;
    t.fundDeposits=(t.fundDeposits||[]).filter(d=>d.id!==depId);
    saveTrip(t); this.renderTab();
  },
  addMember(){
    const inp=document.getElementById('in-member');
    const name=inp?.value.trim();
    if(!name) return;
    const t=loadTrip(this.tripId);
    if(!t) return;
    if(t.members.some(m=>m.name===name)){this.showToast('這個名字已存在');return;}
    t.members.push({id:uid(),name,color:this._pickedColor||''});
    saveTrip(t); inp.value=''; this._pickedColor=''; this._showAddMember=false;
    this.renderTrip(); this.showToast(`已新增 ${name}`);
  },

  removeMember(mid){
    const t=loadTrip(this.tripId);
    if(!t) return;
    const m=t.members.find(m=>m.id===mid);
    const msg=m?.isGroupFund
      ?`確定要刪除「${m.name}」？\n刪除後所有存入公款帳的紀錄也會一併消失，無法復原。`
      :`確定要移除 ${m?.name}？`;
    if(!confirm(msg)) return;
    t.members=t.members.filter(m=>m.id!==mid);
    if(m?.isGroupFund) t.fundDeposits=[];
    saveTrip(t); this.renderTab(); this.renderTrip();
  },

  // ── CREATE TRIP ───────────────────────────────
  showCreateTrip(){
    document.getElementById('in-trip-name').value='';
    this._createAvatar=EMOJIS[0];
    this.openModal('m-create');
    this._renderEmojiGrid('create-emoji-grid','create-avatar-preview','_createAvatar');
    this._setAvatarPreview('create-avatar-preview',this._createAvatar);
    setTimeout(()=>document.getElementById('in-trip-name').focus(),320);
  },
  _renderEmojiGrid(gridId,previewId,stateKey){
    const grid=document.getElementById(gridId);
    if(!grid) return;
    grid.innerHTML=EMOJIS.map(e=>`<button type="button" onclick="App._pickTripEmoji('${e}','${gridId}','${previewId}','${stateKey}')" style="width:34px;height:34px;border-radius:8px;border:2px solid ${this[stateKey]===e?'var(--accent)':'transparent'};background:var(--surface);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;">${e}</button>`).join('');
  },
  _pickTripEmoji(e,gridId,previewId,stateKey){
    this[stateKey]=e;
    this._renderEmojiGrid(gridId,previewId,stateKey);
    this._setAvatarPreview(previewId,e);
  },
  _setAvatarPreview(previewId,val){
    const el=document.getElementById(previewId);
    if(!el) return;
    if(val?.startsWith('data:')){
      el.innerHTML=`<img src="${val}" style="width:100%;height:100%;object-fit:cover;">`;
    } else {
      el.textContent=val||'✈️';
    }
  },
  onTripPhotoSelected(event,mode){
    const file=event.target.files?.[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=(e)=>{
      const data=e.target.result;
      if(mode==='create'){
        this._createAvatar=data;
        this._setAvatarPreview('create-avatar-preview',data);
        this._renderEmojiGrid('create-emoji-grid','create-avatar-preview','_createAvatar');
      } else {
        this._editAvatar=data;
        this._setAvatarPreview('edit-avatar-preview',data);
        this._renderEmojiGrid('edit-emoji-grid','edit-avatar-preview','_editAvatar');
      }
    };
    reader.readAsDataURL(file);
  },
  changeTripAvatar(){
    const t=loadTrip(this.tripId);
    if(!t) return;
    this._editAvatar=t.emoji||EMOJIS[0];
    this.closeModal('m-trip-menu');
    this.openModal('m-trip-avatar');
    setTimeout(()=>{
      this._setAvatarPreview('edit-avatar-preview',this._editAvatar);
      this._renderEmojiGrid('edit-emoji-grid','edit-avatar-preview','_editAvatar');
    },100);
  },
  saveTripAvatar(){
    const t=loadTrip(this.tripId);
    if(!t||!this._editAvatar) return;
    t.emoji=this._editAvatar;
    saveTrip(t);
    this.closeModal('m-trip-avatar');
    this.renderTrip();
    this.showToast('頭像已更新 ✓');
  },

  createTrip(){
    const name=document.getElementById('in-trip-name').value.trim();
    if(!name){document.getElementById('in-trip-name').focus();return;}
    const trip={
      id:uid(), name,
      baseCurrency:document.getElementById('in-trip-base').value,
      emoji:this._createAvatar||EMOJIS[Math.floor(Math.random()*EMOJIS.length)],
      members:[], expenses:{}, rates:{...DEF}, customCurrencies:[], createdAt:Date.now(),
    };
    saveTrip(trip); this.closeModal('m-create');
    this.tripId=trip.id; this.tab='members';
    this.go('trip'); this.showToast(`「${name}」已建立！先去加成員 👥`);
  },

  // ── ADD / EDIT EXPENSE ────────────────────────
  showAddExpense(eid=null){
    const t=loadTrip(this.tripId);
    if(!t) return;
    if(t.members.length<2){
      this.showToast('請先在「成員」頁新增至少 2 位成員');
      this.switchTab('members'); return;
    }
    this.editId=eid; this.splitMode='equal';
    document.getElementById('exp-modal-title').textContent=eid?'編輯支出':'新增支出';
    document.getElementById('in-exp-paid').innerHTML=
      [...t.members].sort((a,b)=>(b.isGroupFund?1:0)-(a.isGroupFund?1:0))
        .map(m=>`<option value="${m.id}">${m.name}</option>`).join('');
    const curSel=document.getElementById('in-exp-cur');
    curSel.querySelectorAll('option.custom-cur').forEach(o=>o.remove());
    (t.customCurrencies||[]).forEach(cc=>{
      const o=document.createElement('option');
      o.value=cc.code; o.textContent=`${curFlag(cc.code)} ${cc.code} ${cc.name}`; o.className='custom-cur';
      curSel.appendChild(o);
    });
    document.getElementById('in-exp-parts').innerHTML=
      t.members.filter(m=>!m.isGroupFund).map(m=>`<button class="chip chip-lg on" id="cp-${m.id}" onclick="App.togglePart('${m.id}')">${m.name}</button>`).join('')+
      `<button class="chip chip-lg" id="cp-none" onclick="App.toggleSelfPurchase()">無（自購）</button>`;
    document.getElementById('sp-eq').className='btn btn-accent flex-1 btn-sm';
    document.getElementById('sp-pr').className='btn btn-ghost flex-1 btn-sm';
    document.getElementById('sp-cu').className='btn btn-ghost flex-1 btn-sm';
    document.getElementById('sp-eq').disabled=false;
    document.getElementById('sp-pr').disabled=false;
    document.getElementById('sp-cu').disabled=false;
    this._proportions=null;
    const todayStr=(()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;})();
    if(eid){
      const e=t.expenses[eid];
      document.getElementById('in-exp-date').value=e.date?e.date.replace(/\//g,'-'):'';
      document.getElementById('in-exp-cat').value=e.category||'其他';
      document.getElementById('in-exp-name').value=e.name;
      document.getElementById('in-exp-cur').value=e.currency;
      document.getElementById('in-exp-amt').value=e.amount;
      if(typeof e.paidBy==='object'&&e.paidBy!==null){
        this.setPayerMode('multi');
        this.renderMultiPayerList(e.paidBy);
      } else {
        this.setPayerMode('single');
        document.getElementById('in-exp-paid').value=e.paidBy;
      }
      document.getElementById('in-exp-pay-method').value=e.payMethod||'現金';
      t.members.forEach(m=>{
        document.getElementById(`cp-${m.id}`)?.classList.toggle('on',(e.parts||[]).includes(m.id));
      });
      this.splitMode=e.splitMode||'equal';
      if(this.splitMode==='self'){
        t.members.forEach(m=>document.getElementById(`cp-${m.id}`)?.classList.remove('on'));
        document.getElementById('cp-none')?.classList.add('on');
        document.getElementById('sp-eq').disabled=true;
        document.getElementById('sp-pr').disabled=true;
        document.getElementById('sp-cu').disabled=true;
      } else if(this.splitMode==='proportion'){
        this._proportions=e.proportions||null;
        this.setSplit('proportion');
      } else if(this.splitMode==='custom'){
        this.setSplit('custom');
      }
      document.getElementById('in-exp-note').value=e.note||'';
    } else {
      document.getElementById('in-exp-date').value=todayStr;
      document.getElementById('in-exp-cat').value='餐飲';
      document.getElementById('in-exp-name').value='';
      document.getElementById('in-exp-cur').value='TWD';
      document.getElementById('in-exp-amt').value='';
      document.getElementById('in-exp-pay-method').value='現金';
    }
    document.getElementById('twd-hint').textContent='';
    document.getElementById('split-preview').innerHTML='';
    const _sb=document.getElementById('split-btns');
    if(_sb) _sb.style.display='flex';
    this.setPayerMode('single');
    document.querySelectorAll('.note-chip').forEach(b=>{b.style.background='#fff';b.style.borderColor='var(--border)';b.style.color='var(--t1)';b.style.fontWeight='400';});
    this.openModal('m-expense');
    setTimeout(()=>{
      document.getElementById('in-exp-name').focus();
      this.updateCatSuggestions(false);
      this.updateSplitPreview();
      if(this.splitMode==='proportion'&&eid){
        const e=t.expenses[eid];
        const parts=Array.from(document.querySelectorAll('#in-exp-parts .chip.on')).map(c=>c.id.replace('cp-',''));
        parts.forEach(pid=>{
          const el=document.getElementById(`ppct-${pid}`);
          if(el&&e.proportions?.[pid]!=null) el.value=e.proportions[pid];
        });
        this.updateProportionTotal();
      } else if(this.splitMode==='custom'&&eid){
        const e=t.expenses[eid];
        const parts=Array.from(document.querySelectorAll('#in-exp-parts .chip.on')).map(c=>c.id.replace('cp-',''));
        parts.forEach(pid=>{
          const el=document.getElementById(`camt-${pid}`);
          if(el&&e.customAmounts?.[pid]) el.value=e.customAmounts[pid];
        });
        this.updateCustomTotal();
      }
    },80);
  },

  togglePart(id){
    document.getElementById('cp-none')?.classList.remove('on');
    if(this.splitMode==='self'){
      this.splitMode='equal';
      const sb=document.getElementById('split-btns');
      if(sb) sb.style.display='flex';
      document.getElementById('sp-eq').className='btn btn-accent flex-1 btn-sm';
      document.getElementById('sp-pr').className='btn btn-ghost flex-1 btn-sm';
      document.getElementById('sp-cu').className='btn btn-ghost flex-1 btn-sm';
      document.getElementById('sp-eq').disabled=false;
      document.getElementById('sp-pr').disabled=false;
      document.getElementById('sp-cu').disabled=false;
    }
    document.getElementById(`cp-${id}`)?.classList.toggle('on');
    if(this.splitMode==='proportion') this._proportions={};
    this.updateSplitPreview();
  },

  toggleSelfPurchase(){
    const noneBtn=document.getElementById('cp-none');
    const turning=!noneBtn?.classList.contains('on');
    document.querySelectorAll('#in-exp-parts .chip').forEach(c=>{
      if(c.id!=='cp-none') c.classList.remove('on');
    });
    noneBtn?.classList.toggle('on',turning);
    this.splitMode=turning?'self':'equal';
    const splitBtns=document.getElementById('split-btns');
    if(splitBtns) splitBtns.style.display=turning?'none':'flex';
    if(!turning){
      document.getElementById('sp-eq').disabled=false;
      document.getElementById('sp-pr').disabled=false;
      document.getElementById('sp-cu').disabled=false;
      document.getElementById('sp-eq').className='btn btn-accent flex-1 btn-sm';
      document.getElementById('sp-pr').className='btn btn-ghost flex-1 btn-sm';
      document.getElementById('sp-cu').className='btn btn-ghost flex-1 btn-sm';
    }
    document.getElementById('split-preview').innerHTML='';
    this.updateSplitPreview();
  },

  setSplit(mode){
    this.splitMode=mode;
    document.getElementById('sp-eq').className=mode==='equal'?'btn btn-accent flex-1 btn-sm':'btn btn-ghost flex-1 btn-sm';
    document.getElementById('sp-pr').className=mode==='proportion'?'btn btn-accent flex-1 btn-sm':'btn btn-ghost flex-1 btn-sm';
    document.getElementById('sp-cu').className=mode==='custom'?'btn btn-accent flex-1 btn-sm':'btn btn-ghost flex-1 btn-sm';

  },

  updateSplitPreview(){
    const box=document.getElementById('split-preview');
    if(!box) return;
    const t=loadTrip(this.tripId);
    if(!t) return;
    const countEl=document.getElementById('parts-count');
    if(countEl){
      if(this.splitMode==='self'){countEl.textContent='';}
      else{
        const n=Array.from(document.querySelectorAll('#in-exp-parts .chip.on')).length;
        countEl.textContent=n>0?`x${n}`:'';
      }
    }
    if(this.splitMode==='self'){
      box.innerHTML=`<div style="background:#EEF0FF;border-radius:12px;padding:10px 14px;font-size:13px;color:var(--accent);font-weight:600;">✓ 自購 — 僅記錄支出，不計入分帳</div>`;
      return;
    }
    const parts=Array.from(document.querySelectorAll('#in-exp-parts .chip.on')).map(c=>c.id.replace('cp-',''));
    const rawAmt=document.getElementById('in-exp-amt')?.value.replace(/,/g,'')||'';
    const amt=parseFloat(rawAmt);
    const cur=document.getElementById('in-exp-cur')?.value||'TWD';
    const sym=(C[cur]||C.TWD).sym;
    if(!parts.length){box.innerHTML='';return;}
    if(parts.length===1){box.innerHTML=`<div style="background:#FFF7ED;border-radius:12px;padding:10px 14px;font-size:13px;color:#F97316;font-weight:600;">⚠️ 只有 1 人分攤，等同自購 — 僅記錄支出，不計入分帳</div>`;return;}
    if(this.splitMode!=='proportion'&&(!amt||isNaN(amt))){box.innerHTML='';return;}
    const mName=id=>{const m=t.members.find(m=>m.id===id);return m?.name||id;};
    if(this.splitMode==='equal'){
      const sh=amt/parts.length;
      const shFmt=fmtNum(sh);
      const bSym=(C[t.baseCurrency]||C.TWD).sym;
      const showTWD=cur!==t.baseCurrency;
      const rows=parts.map(pid=>{
        const shTWD=toBase(sh,cur,t.rates,t.baseCurrency);
        return `<div class="flex justify-between items-center" style="padding:6px 0;border-bottom:1px solid var(--border);">
          <span style="font-size:14px;font-weight:600;">${mName(pid)}</span>
          <div style="text-align:right;">
            <div style="font-size:14px;font-weight:700;">${sym}${shFmt}</div>
            ${showTWD?`<div style="font-size:11px;color:var(--t2);">≈ ${bSym}${Math.round(shTWD).toLocaleString()}</div>`:''}
          </div>
        </div>`;
      }).join('');
      box.innerHTML=`<div style="background:var(--surface);border-radius:12px;padding:12px 14px;border:1px solid var(--border);">
        <div style="font-size:12px;color:var(--t2);margin-bottom:6px;">試算結果（平均）</div>
        ${rows}
        <div style="display:flex;justify-content:space-between;align-items:center;padding-top:8px;margin-top:4px;border-top:1px solid var(--border);">
          <span style="font-size:12px;color:var(--t2);">合計</span>
          <div style="text-align:right;">
            <div style="font-size:13px;font-weight:700;">${sym}${fmtNum(amt)}</div>
            ${showTWD?`<div style="font-size:11px;color:var(--t2);">≈ ${bSym}${Math.round(toBase(amt,cur,t.rates,t.baseCurrency)).toLocaleString()}</div>`:''}
          </div>
        </div>
      </div>`;
    } else if(this.splitMode==='proportion'){
      const eqPct=(100/parts.length);
      const rows=parts.map(pid=>{
        const defPct=this._proportions?.[pid]??eqPct;
        return `<div class="flex items-center gap-2" style="margin-bottom:8px;">
          <span style="font-size:13px;font-weight:600;width:52px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${mName(pid)}</span>
          <input type="text" inputmode="decimal" id="ppct-${pid}" class="input" style="width:68px;flex-shrink:0;height:38px;font-size:14px;text-align:right;"
            value="${+defPct.toFixed(2)}" oninput="App.updateProportionTotal()">
          <span style="font-size:13px;color:var(--t2);flex-shrink:0;">%</span>
          <div style="flex:1;text-align:right;min-width:0;overflow:hidden;">
            <div id="pamt-${pid}" style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
            <div id="ptwd-${pid}" style="font-size:11px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
          </div>
        </div>`;
      }).join('');
      box.innerHTML=`<div style="background:var(--surface);border-radius:12px;padding:12px 14px;border:1px solid var(--border);">
        <div style="font-size:12px;color:var(--t2);margin-bottom:8px;">各人比例（%）</div>
        ${rows}
        <div class="flex justify-between items-center" style="padding-top:8px;border-top:1px solid var(--border);">
          <span style="font-size:12px;color:var(--t2);">合計比例</span>
          <span id="pct-total-hint" style="font-size:13px;font-weight:700;"></span>
        </div>
      </div>`;
      this.updateProportionTotal();
    } else {
      const rows=parts.map(pid=>`
        <div class="flex items-center gap-2" style="margin-bottom:8px;">
          <span style="font-size:13px;font-weight:600;width:56px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${mName(pid)}</span>
          <div style="flex:1;display:flex;flex-direction:column;gap:2px;">
            <div class="flex items-center gap-1">
              <span style="font-size:12px;color:var(--t2);flex-shrink:0;">${sym}</span>
              <input type="text" inputmode="decimal" id="camt-${pid}" class="input flex-1" style="height:38px;font-size:14px;"
                placeholder="0" oninput="App.fmtAmtInput(this);App.updateCustomTotal()">
            </div>
            <div id="ctwd-${pid}" style="font-size:11px;color:var(--t2);text-align:right;padding-right:2px;"></div>
          </div>
        </div>`).join('');
      box.innerHTML=`<div style="background:var(--surface);border-radius:12px;padding:12px 14px;border:1px solid var(--border);">
        <div style="font-size:12px;color:var(--t2);margin-bottom:8px;">各人自訂金額</div>
        ${rows}
        <div class="flex justify-between items-center" style="padding-top:8px;border-top:1px solid var(--border);">
          <span style="font-size:12px;color:var(--t2);">合計</span>
          <span id="custom-total-hint" style="font-size:13px;font-weight:700;"></span>
        </div>
      </div>`;
      this.updateCustomTotal();
    }
  },

  updateCatSuggestions(clearName=true){
    const cat=document.getElementById('in-exp-cat')?.value||'其他';
    const box=document.getElementById('cat-suggestions');
    if(!box) return;
    if(clearName){
      const nameEl=document.getElementById('in-exp-name');
      if(nameEl) nameEl.value='';
    }
    const items=CAT_SUGGESTIONS[cat]||[];
    box.innerHTML=items.map(([,name])=>`<button type="button" class="sug-chip" onclick="App.pickSuggestion(this,'${name}')" style="display:inline-flex;align-items:center;padding:4px 9px;border-radius:999px;border:1.5px solid var(--border);background:#fff;font-size:11px;color:var(--t1);cursor:pointer;white-space:nowrap;transition:all .15s;">${name}</button>`).join('');
  },
  setPayerMode(mode){
    this._payerMode=mode;
    const single=document.getElementById('payer-single');
    const multi=document.getElementById('payer-multi');
    const sBtn=document.getElementById('pay-single-btn');
    const mBtn=document.getElementById('pay-multi-btn');
    if(single) single.style.display=mode==='single'?'':'none';
    if(multi) multi.style.display=mode==='multi'?'':'none';
    if(sBtn){sBtn.style.background=mode==='single'?'var(--accent)':'var(--surface)';sBtn.style.color=mode==='single'?'#fff':'var(--t2)';}
    if(mBtn){mBtn.style.background=mode==='multi'?'var(--accent)':'var(--surface)';mBtn.style.color=mode==='multi'?'#fff':'var(--t2)';}
    if(mode==='multi') this.renderMultiPayerList();
  },
  renderMultiPayerList(prefill=null){
    const t=loadTrip(this.tripId);
    if(!t) return;
    const box=document.getElementById('payer-multi');
    if(!box) return;
    const cur=document.getElementById('in-exp-cur')?.value||'TWD';
    const sym=(C[cur]||C.TWD).sym;
    box.innerHTML=`<div style="background:var(--surface);border-radius:12px;padding:12px;border:1px solid var(--border);">`+
      t.members.map(m=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <span style="font-size:13px;font-weight:600;width:52px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${m.name.slice(0,5)}</span>
        <span style="font-size:13px;flex-shrink:0;">${sym}</span>
        <input type="text" inputmode="decimal" id="mp-${m.id}" class="input" style="flex:1;height:38px;font-size:14px;text-align:right;" placeholder="0"
          value="${prefill&&prefill[m.id]?prefill[m.id]:''}" oninput="App.fmtAmtInput(this);App.updateMultiPayerHint()">
      </div>`).join('')+
      `<div id="multi-payer-hint" style="font-size:12px;color:var(--t2);margin-top:4px;text-align:right;"></div></div>`;
