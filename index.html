  updateMultiPayerHint(){
    const t=loadTrip(this.tripId);
    if(!t) return;
    const rawAmt=parseFloat(document.getElementById('in-exp-amt')?.value.replace(/,/g,'')||'0')||0;
    const cur=document.getElementById('in-exp-cur')?.value||'TWD';
    const sym=(C[cur]||C.TWD).sym;
    let total=0;
    t.members.forEach(m=>{
      const v=parseFloat(document.getElementById(`mp-${m.id}`)?.value.replace(/,/g,'')||'0')||0;
      total+=v;
    });
    const hint=document.getElementById('multi-payer-hint');
    if(!hint) return;
    const ok=rawAmt>0&&Math.abs(total-rawAmt)<0.5;
    hint.textContent=`合計 ${sym}${fmtNum(total)} / ${sym}${fmtNum(rawAmt)}`;
    hint.style.color=ok?'var(--success)':'#EF4444';
  },

  pickNote(btn,name){
    document.querySelectorAll('.note-chip').forEach(b=>{
      b.style.background='#fff';b.style.borderColor='var(--border)';b.style.color='var(--t1)';b.style.fontWeight='400';
    });
    btn.style.background='var(--accent)';btn.style.borderColor='var(--accent)';btn.style.color='#fff';btn.style.fontWeight='700';
    const el=document.getElementById('in-exp-note');
    if(el){el.value=name;el.focus();}
  },
  pickSuggestion(btn,name){
    document.querySelectorAll('#cat-suggestions .sug-chip').forEach(b=>{
      b.style.background='#fff';b.style.borderColor='var(--border)';b.style.color='var(--t1)';b.style.fontWeight='400';
    });
    btn.style.background='var(--accent)';btn.style.borderColor='var(--accent)';btn.style.color='#fff';btn.style.fontWeight='700';
    const el=document.getElementById('in-exp-name');
    if(el){el.value=name+'-';el.focus();el.setSelectionRange(el.value.length,el.value.length);}
  },

  updateProportionTotal(){
    const parts=Array.from(document.querySelectorAll('#in-exp-parts .chip.on')).map(c=>c.id.replace('cp-',''));
    const rawAmt=document.getElementById('in-exp-amt')?.value.replace(/,/g,'')||'0';
    const amt=parseFloat(rawAmt)||0;
    const cur=document.getElementById('in-exp-cur')?.value||'TWD';
    const sym=(C[cur]||C.TWD).sym;
    let total=0;
    const result={};
    for(const pid of parts){
      const v=parseFloat(document.getElementById(`ppct-${pid}`)?.value||'0')||0;
      result[pid]=v; total+=v;
    }
    this._proportions=result;
    const hasZero=parts.some(pid=>(result[pid]||0)===0);
    const hint=document.getElementById('pct-total-hint');
    if(hint){
      const ok=Math.abs(total-100)<0.5&&!hasZero;
      if(hasZero) hint.textContent='有成員比例為 0%，請取消勾選或填入比例';
      else hint.textContent=`${total.toFixed(1)}%${Math.abs(total-100)<0.5?' ✓':` （差 ${(100-total).toFixed(1)}%）`}`;
      hint.style.color=ok?'var(--success)':'#EF4444';
    }
    const t2=loadTrip(this.tripId);
    const bSym2=t2?(C[t2.baseCurrency]||C.TWD).sym:'NT$';
    const showTWD2=t2&&cur!==t2.baseCurrency;
    parts.forEach(pid=>{
      const pct=result[pid]||0;
      const el=document.getElementById(`pamt-${pid}`);
      const elTWD=document.getElementById(`ptwd-${pid}`);
      const inputEl=document.getElementById(`ppct-${pid}`);
      if(inputEl) inputEl.style.borderColor=pct===0?'#EF4444':'';
      if(!el) return;
      if(amt>0){
        const share=amt*(pct/100);
        el.textContent=pct===0?'未分攤':`${sym}${fmtNum(share)}`;
        el.style.color=pct===0?'#EF4444':'var(--t1)';
        if(elTWD&&showTWD2&&t2){
          const shTWD=toBase(share,cur,t2.rates,t2.baseCurrency);
          elTWD.textContent=`≈ ${bSym2}${Math.round(shTWD).toLocaleString()}`;
        } else if(elTWD) elTWD.textContent='';
      } else {
        el.textContent='—';
        el.style.color='var(--t2)';
        if(elTWD) elTWD.textContent='';
      }
    });
  },

  updateCustomTotal(){
    const parts=Array.from(document.querySelectorAll('#in-exp-parts .chip.on')).map(c=>c.id.replace('cp-',''));
    const rawAmt=document.getElementById('in-exp-amt')?.value.replace(/,/g,'')||'0';
    const amt=parseFloat(rawAmt)||0;
    const cur=document.getElementById('in-exp-cur')?.value||'TWD';
    const sym=(C[cur]||C.TWD).sym;
    const t=loadTrip(this.tripId);
    const bSym=t?(C[t.baseCurrency]||C.TWD).sym:'NT$';
    const showTWD=t&&cur!==t.baseCurrency;
    let total=0;
    parts.forEach(pid=>{
      const v=parseFloat(document.getElementById(`camt-${pid}`)?.value.replace(/,/g,'')||'0')||0;
      total+=v;
      const elTWD=document.getElementById(`ctwd-${pid}`);
      if(elTWD&&showTWD&&t&&v>0){
        const vTWD=toBase(v,cur,t.rates,t.baseCurrency);
        elTWD.textContent=`≈ ${bSym}${Math.round(vTWD).toLocaleString()}`;
      } else if(elTWD) elTWD.textContent='';
    });
    const hint=document.getElementById('custom-total-hint');
    if(!hint) return;
    const ok=Math.abs(total-amt)<0.5;
    hint.textContent=`${sym}${total.toLocaleString()} / ${sym}${amt.toLocaleString()}`;
    hint.style.color=ok?'var(--accent)':'#EF4444';
  },

  fmtAmtInput(el){
    const cursorFromEnd=el.value.length-el.selectionStart;
    const raw=el.value.replace(/,/g,'');
    if(!raw) return;
    const dotIdx=raw.indexOf('.');
    const intStr=dotIdx>=0?raw.slice(0,dotIdx):raw;
    const decStr=dotIdx>=0?raw.slice(dotIdx):'';
    const intNum=parseInt(intStr,10);
    const formatted=(isNaN(intNum)?'':intNum.toLocaleString())+decStr;
    if(el.value!==formatted){
      el.value=formatted;
      const pos=Math.max(0,formatted.length-cursorFromEnd);
      el.setSelectionRange(pos,pos);
    }
  },

  previewTWD(){
    const raw=document.getElementById('in-exp-amt').value.replace(/,/g,'');
    const amt=parseFloat(raw);
    const cur=document.getElementById('in-exp-cur').value;
    const hint=document.getElementById('twd-hint');
    if(!amt||isNaN(amt)||cur==='TWD'||cur==='OTHER'){hint.textContent='';}
    else{
      const t=loadTrip(this.tripId);
      const rate=(t?.rates[cur])||DEF[cur]||1;
      hint.textContent=`≈ NT$${Math.round(amt*rate).toLocaleString()}（匯率 ${rate}）`;
    }
    this.updateSplitPreview();
  },

  saveExpense(){
    const category=document.getElementById('in-exp-cat').value;
    const payMethod=document.getElementById('in-exp-pay-method').value;
    const name=document.getElementById('in-exp-name').value.trim().replace(/-$/,'');
    const amount=parseFloat(document.getElementById('in-exp-amt').value.replace(/,/g,''));
    const currency=document.getElementById('in-exp-cur').value;
    const note=document.getElementById('in-exp-note')?.value.trim()||'';
    const isPending=note==='金額待補';
    if(!name){this.showToast('請輸入支出項目');return;}
    if(!isPending&&(!amount||isNaN(amount)||amount<=0)){this.showToast('請輸入有效金額，或備註填入「金額待補」');return;}
    let paidBy;
    if(this._payerMode==='multi'){
      const _t=loadTrip(this.tripId);
      paidBy={};let _payTot=0;
      _t.members.forEach(m=>{const v=parseFloat(document.getElementById(`mp-${m.id}`)?.value.replace(/,/g,'')||'0')||0;if(v>0){paidBy[m.id]=v;_payTot+=v;}});
      if(!Object.keys(paidBy).length){this.showToast('請輸入付款金額');return;}
      if(!isPending&&Math.abs(_payTot-amount)>0.5){this.showToast(`付款合計 ${_payTot.toLocaleString()} ≠ 支出金額 ${amount.toLocaleString()}`);return;}
    } else {
      paidBy=document.getElementById('in-exp-paid').value;
    }
    let parts,customAmounts=null,proportions=null;
    if(this.splitMode==='self'){
      parts=[paidBy];
    } else {
      parts=Array.from(document.querySelectorAll('#in-exp-parts .chip.on')).map(c=>c.id.replace('cp-',''));
      if(!parts.length){this.showToast('請選擇分攤對象');return;}
      if(this.splitMode==='proportion'&&!isPending){
        proportions={};
        customAmounts={};
        let pctTotal=0;
        for(const pid of parts){
          const pct=parseFloat(document.getElementById(`ppct-${pid}`)?.value||'0')||0;
          proportions[pid]=pct; pctTotal+=pct;
        }
        if(Math.abs(pctTotal-100)>0.5){this.showToast(`比例合計 ${pctTotal.toFixed(1)}% ≠ 100%`);return;}
        if(parts.some(pid=>!proportions[pid])){this.showToast('有成員比例為 0%，請取消勾選或補填比例');return;}
        for(const pid of parts) customAmounts[pid]=amount*(proportions[pid]/100);
      } else if(this.splitMode==='custom'&&!isPending){
        customAmounts={};
        let total=0;
        for(const pid of parts){
          const v=parseFloat(document.getElementById(`camt-${pid}`)?.value.replace(/,/g,'')||'0')||0;
          customAmounts[pid]=v; total+=v;
        }
        if(Math.abs(total-amount)>0.5){
          this.showToast(`各人合計 ${total.toLocaleString()} ≠ 支出金額 ${amount.toLocaleString()}`);
          return;
        }
      }
    }
    const t=loadTrip(this.tripId);
    if(!t) return;
    const dateInput=document.getElementById('in-exp-date').value;
    if(!dateInput){this.showToast('請填寫支出日期');return;}
    const date=dateInput.replace(/-/g,'/');
    const exp={category,payMethod,name,amount:isPending?0:amount,currency,paidBy,parts,splitMode:this.splitMode,customAmounts,proportions,note,date,createdAt:Date.now()};
    if(this.editId){t.expenses[this.editId]={...t.expenses[this.editId],...exp};}
    else{t.expenses[uid()]=exp;}
    saveTrip(t); this.closeModal('m-expense');
    this.renderTrip(); this.showToast(this.editId?'已更新支出 ✓':'支出已新增！');
    this.editId=null;
  },

  // ── DETAIL ────────────────────────────────────
  toggleExpExpand(id){this._expandedExp[id]=!this._expandedExp[id];this.renderTab();},
  editExpInline(id){this.expId=id;this.showAddExpense(id);},
  deleteExpInline(id){
    if(!confirm('確定要刪除這筆支出？')) return;
    const t=loadTrip(this.tripId); if(!t) return;
    delete t.expenses[id]; saveTrip(t);
    delete this._expandedExp[id];
    this.renderTab(); this.showToast('已刪除支出');
  },
  openDetail(eid){this.expId=eid; this.go('detail');},

  renderDetail(){
    const t=loadTrip(this.tripId);
    if(!t){this.go('trip');return;}
    const e=t.expenses[this.expId];
    if(!e){this.go('trip');return;}
    const sym=(C[e.currency]||C.TWD).sym;
    const payer=typeof e.paidBy==='object'&&e.paidBy!==null?null:t.members.find(m=>m.id===e.paidBy);
    const payerLabel=typeof e.paidBy==='object'&&e.paidBy!==null
      ?Object.entries(e.paidBy).map(([id,amt])=>{const m=t.members.find(m=>m.id===id);return `${m?.name||'?'} ${sym}${fmtNum(amt)}`;}).join('、')
      :(payer?.name||'?');
    const twdA=toBase(e.amount,e.currency,t.rates,t.baseCurrency);
    const bSym=(C[t.baseCurrency]||C.TWD).sym;
    const ps=e.parts||t.members.map(m=>m.id);
    const splitLabel=e.splitMode==='self'?'自購':e.splitMode==='custom'?'自訂金額':e.splitMode==='proportion'?'按比例':'平均分攤';
    const partDivs=ps.map(pid=>{
      const m=t.members.find(m=>m.id===pid);
      let sh;
      if((e.splitMode==='custom'||e.splitMode==='proportion')&&e.customAmounts) sh=e.customAmounts[pid]||0;
      else sh=e.amount/ps.length;
      const shB=toBase(sh,e.currency,t.rates,t.baseCurrency);
      const pctStr=e.splitMode==='proportion'&&e.proportions?` (${e.proportions[pid]||0}%)`:'';
      return `<div style="text-align:center;min-width:64px;">
        <div class="avatar" style="margin:0 auto 6px;${avStyle(t,pid)}">${avText(m?.name)}</div>
        <div class="xs semibold">${m?.name||'?'}${pctStr}</div>
        <div class="xs bold mt1 dark">${sym}${Math.round(sh).toLocaleString()}</div>
        <div class="xs muted">≈ ${bSym}${Math.round(shB)}</div>
      </div>`;
    }).join('');
    const catIcon=CAT_ICON[e.category]||'🎁';
    const isPending=e.note==='金額待補';
    document.getElementById('detail-content').innerHTML=`
      <div style="display:flex;align-items:center;gap:16px;padding:20px 20px 16px;">
        <div style="width:64px;height:64px;border-radius:16px;background:var(--soft);display:flex;align-items:center;justify-content:center;font-size:34px;flex-shrink:0;">${catIcon}</div>
        <div style="min-width:0;">
          <div style="font-size:20px;font-weight:800;color:var(--primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${e.name}</div>
          <div style="font-size:26px;font-weight:800;margin-top:4px;">${isPending?'待補':sym+Number(e.amount).toLocaleString()}</div>
          ${!isPending&&e.currency!==t.baseCurrency?`<div class="sm muted">≈ ${bSym}${Math.round(twdA).toLocaleString()}</div>`:''}
        </div>
      </div>
      <div class="card" style="padding:4px 16px;margin-bottom:12px;">
        ${[['支付人',payerLabel],['支出日期',e.date||'-'],['分攤方式',splitLabel],['備註',e.note||'-']].map(([l,v])=>`
          <div class="info-row"><span class="sm muted">${l}</span><span class="sm semibold" style="word-break:break-all;">${v}</span></div>`).join('')}
      </div>
      <div class="card" style="padding:16px;">
        <div class="form-label mb3">分攤成員</div>
        <div style="display:flex;gap:20px;flex-wrap:wrap;">${partDivs}</div>
      </div>`;
  },

  editExpense(){this.go('trip'); this.showAddExpense(this.expId);},

  deleteExpense(){
    if(!confirm('確定要刪除這筆支出？')) return;
    const t=loadTrip(this.tripId);
    if(t&&t.expenses[this.expId]){
      delete t.expenses[this.expId]; saveTrip(t);
      this.go('trip'); this.renderTrip(); this.showToast('已刪除支出');

      <div class="card" style="padding:14px 16px;margin-bottom:8px;background:var(--soft);border-color:var(--soft);">

        <div class="xs muted mt1">匯率影響所有支出的換算結果</div>

      <div class="card" style="padding:14px 16px;margin-bottom:16px;background:#FFFBEB;border-color:#FDE68A;">
        <div class="xs semibold" style="color:#92400E;margin-bottom:4px;">⚠️ 預設匯率為參考值</div>
        <div class="xs" style="color:#78350F;line-height:1.6;">以 2026 年 5 月市場匯率為基準手動填入，<strong>非即時匯率</strong>。<br>可按下方「取得即時匯率」自動填入當日行情。</div>

      <button class="btn btn-ghost btn-full mt2" id="btn-fetch-rates" onclick="App.fetchLiveRates()" style="display:flex;align-items:center;justify-content:center;gap:6px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg> 取得即時匯率</button>
      <button class="btn btn-ghost btn-full mt2" onclick="App.resetRates()" style="display:flex;align-items:center;justify-content:center;gap:6px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg> 還原預設匯率</button>
      <div class="divider" style="margin:20px 0;"></div>
      <div class="sm semibold mb3">新增其他貨幣</div>
      <div class="flex gap-2 mb2">
        <input id="r-new-code" class="input" placeholder="代碼（如 THB）" style="width:130px;text-transform:uppercase;" oninput="App.autoFillRate(this.value)">
        <div style="position:relative;flex:1;">
          <input id="r-new-name" class="input" style="width:100%;" placeholder="名稱或關鍵字" oninput="App.searchCurrency(this.value)" autocomplete="off">
          <div id="cur-suggestions" style="position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:50;display:none;max-height:200px;overflow-y:auto;"></div>

        <span class="xs muted" style="white-space:nowrap;">1 單位 =</span>
        <input id="r-new-rate" class="input flex-1" type="number" placeholder="換算台幣匯率" min="0" step="any">
        <span class="xs muted">TWD</span>
      </div>
      <button class="btn btn-ghost btn-full" onclick="App.addCustomCurrency()">＋ 新增貨幣</button>
      <div style="height:20px;"></div>`;

  searchCurrency(q){
    const box=document.getElementById('cur-suggestions');
    if(!box) return;
    const n=q.trim().toLowerCase();
    if(!n){box.style.display='none';return;}
    const results=Object.entries(CUR_ZH).filter(([code,zh])=>
      zh.toLowerCase().includes(n)||code.toLowerCase().includes(n)
    ).slice(0,8);
    if(!results.length){box.style.display='none';return;}
    box.style.display='block';
    box.innerHTML=results.map(([code,zh])=>`
      <div onclick="App.selectCurrencySuggestion('${code}','${zh}')" style="display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);" onmouseover="this.style.background='var(--soft)'" onmouseout="this.style.background=''">
        <span style="font-size:20px;">${curFlag(code)}</span>
        <span style="font-weight:600;">${code}</span>
        <span style="color:var(--t2);font-size:13px;">${zh}</span>
      </div>`).join('');
  },
  selectCurrencySuggestion(code,zh){
    const codeEl=document.getElementById('r-new-code');
    const nameEl=document.getElementById('r-new-name');
    const box=document.getElementById('cur-suggestions');
    if(codeEl) codeEl.value=code;
    if(nameEl) nameEl.value=zh;
    if(box) box.style.display='none';
    this.autoFillRate(code);
  },

  async autoFillRate(raw){
    const code=raw.trim().toUpperCase();
    const rateEl=document.getElementById('r-new-rate');
    const nameEl=document.getElementById('r-new-name');
    if(!rateEl) return;
    // auto-fill name from Chinese map
    if(nameEl&&!nameEl.value&&CUR_ZH[code]) nameEl.value=CUR_ZH[code];
    if(DEF[code]){rateEl.value=DEF[code];return;}
    if(code.length!==3) return;
    try{
      const [rateRes,nameRes]=await Promise.all([
        fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/twd.json'),
        fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies.json')
      ]);
      const rateData=await rateRes.json();
      const nameData=await nameRes.json();
      const r=rateData.twd?.[code.toLowerCase()];
      if(r){const v=1/r; rateEl.value=v>=1?+(v.toFixed(2)):+(v.toPrecision(4));}
      if(nameEl&&!nameEl.value){
        const n=CUR_ZH[code]||nameData[code.toLowerCase()];
        if(n) nameEl.value=n;
      }
    }catch(e){}
  },

  async fetchLiveRates(){
    const btn=document.getElementById('btn-fetch-rates');
    if(btn){btn.disabled=true;btn.textContent='更新中…';}
    try{
      const res=await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/twd.json');
      const data=await res.json();
      const r=data.twd;
      ['JPY','USD','EUR','GBP','KRW','VND','THB','IDR'].forEach(c=>{
        const el=document.getElementById(`r-${c}`);
        const rate=r[c.toLowerCase()];
        if(el&&rate){
          const v=1/rate;
          el.value=v>=1?+(v.toFixed(2)):+(v.toPrecision(4));
        }
      });
      this.showToast('即時匯率已更新，記得按儲存 ✓');
    }catch(e){
      this.showToast('取得失敗，請確認網路連線');
    }finally{
      if(btn){btn.disabled=false;btn.textContent='取得即時匯率';}
    }
  },

  saveRates(){
    const t=loadTrip(this.tripId);
    if(!t) return;
    Object.keys(C).filter(c=>c!=='TWD').forEach(c=>{
      const v=parseFloat(document.getElementById(`r-${c}`)?.value);
      if(v>0) t.rates[c]=v;
    });
    (t.customCurrencies||[]).forEach(cc=>{
      const v=parseFloat(document.getElementById(`r-${cc.code}`)?.value);
      if(v>0) t.rates[cc.code]=v;
    });
    saveTrip(t); this.showToast('匯率已儲存 ✓'); this.go('trip');
  },

  resetRates(){
    Object.keys(C).filter(c=>c!=='TWD').forEach(c=>{
      const el=document.getElementById(`r-${c}`);
      if(el) el.value=DEF[c];
    });
    this.showToast('已還原預設匯率');
  },

  addCustomCurrency(){
    const code=document.getElementById('r-new-code').value.trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
    const name=document.getElementById('r-new-name').value.trim();
    const rate=parseFloat(document.getElementById('r-new-rate').value);
    if(!code||code.length>6){this.showToast('請輸入有效代碼（最多6個英文字母）');return;}
    if(!name){this.showToast('請輸入貨幣名稱');return;}
    if(!rate||rate<=0){this.showToast('請輸入有效匯率');return;}
    if(C[code]){this.showToast(`${code} 已在預設列表中`);return;}
    const t=loadTrip(this.tripId);
    if(!t) return;
    if(!t.customCurrencies) t.customCurrencies=[];
    if(t.customCurrencies.find(c=>c.code===code)){this.showToast(`${code} 已存在`);return;}
    t.customCurrencies.push({code,name});
    t.rates[code]=rate;
    saveTrip(t); this.showToast(`已新增 ${code} ${name} ✓`); this.renderRates();
  },

  deleteCustomCurrency(code){
    const t=loadTrip(this.tripId);
    if(!t) return;
    t.customCurrencies=(t.customCurrencies||[]).filter(c=>c.code!==code);
    delete t.rates[code];
    saveTrip(t); this.showToast(`已刪除 ${code}`); this.renderRates();
  },

  // ── SHARE / IMPORT ────────────────────────────
  shareTrip(){this.openModal('m-share');},

  _shareUrl(){
    const t=loadTrip(this.tripId);
    return t?`${location.origin}${location.pathname}#join=${t.id}`:null;
  },

  shareCopy(){
    const url=this._shareUrl(); if(!url) return;
    navigator.clipboard?.writeText(url)
      .then(()=>{this.closeModal('m-share');this.showToast('連結已複製！');})
      .catch(()=>{prompt('複製這個連結：',url);this.closeModal('m-share');});
  },

  shareLine(){
    const url=this._shareUrl(); if(!url) return;
    const t=loadTrip(this.tripId);
    const text=encodeURIComponent(`來加入「${t?.name||''}」旅遊分帳！\n${url}`);
    window.open(`https://line.me/R/msg/text/?${text}`,'_blank');

  shareNative(){
    const url=this._shareUrl(); if(!url) return;
    const t=loadTrip(this.tripId);
    if(navigator.share){
      navigator.share({title:t?.name||'RoamSplit',text:`來加入「${t?.name||''}」旅遊分帳！`,url});
      this.closeModal('m-share');

  checkShare(){
    const h=location.hash;
    if(h.startsWith('#join=')){
      const id=h.slice(6);
      history.replaceState(null,'',location.pathname);
      fetch(`${FBURL}/trips/${id}.json`)
        .then(r=>r.json())
        .then(trip=>{
          if(!trip){this.showToast('找不到此旅程，連結可能已失效');return;}
          this.pending=trip;
          document.getElementById('import-info').innerHTML=`
            <div style="font-size:36px;margin-bottom:8px;">${trip.emoji||'✈️'}</div>
            <div class="lg bold">${trip.name}</div>
            <div class="sm muted mt2">${trip.members.length} 位成員 · ${Object.keys(trip.expenses||{}).length} 筆支出</div>`;
          this.openModal('m-import');
        })
        .catch(()=>this.showToast('無法載入旅程，請確認網路連線'));
    } else if(h.startsWith('#share=')){
      const trip=decTrip(h.slice(7));
      if(!trip){this.showToast('連結無效或已損壞');return;}
      this.pending=trip;
      document.getElementById('import-info').innerHTML=`
        <div style="font-size:36px;margin-bottom:8px;">${trip.emoji||'✈️'}</div>
        <div class="lg bold">${trip.name}</div>
        <div class="sm muted mt2">${trip.members.length} 位成員 · ${Object.keys(trip.expenses||{}).length} 筆支出</div>`;
      this.openModal('m-import');
      history.replaceState(null,'',location.pathname);
    }

  confirmImport(){
    if(!this.pending) return;
    const t=this.pending;
    const ex=loadTrip(t.id);
    if(ex) t.expenses={...ex.expenses,...t.expenses};
    saveTrip(t); this.pending=null;
    this.closeModal('m-import');
    this.tripId=t.id; this.tab='expenses';
    this.go('trip'); this.showToast(`已加入「${t.name}」！`);
  },

  renameTrip(){
    const t=loadTrip(this.tripId);
    if(!t) return;
    const newName=prompt('修改旅程名稱：',t.name);
    if(newName===null||!newName.trim()) return;
    t.name=newName.trim();
    saveTrip(t);
    this.closeModal('m-trip-menu');
    this.renderTrip();
    this.showToast('旅程名稱已更新 ✓');
  },

  exportSettlement(){
    const t=loadTrip(this.tripId);
    if(!t) return;
    const bal=calcBal(t);
    const txs=minimizeTx(bal);
    const mName=id=>{const m=t.members.find(m=>m.id===id);return m?.name||id;};
    let text=`【${t.name}】結算明細\n`;
    if(txs.length===0){
      text+='🎉 大家都平帳了！';
    } else {
      text+=`共需 ${txs.length} 筆轉帳：\n`;
      txs.forEach(tx=>{text+=`• ${mName(tx.from)} 付給 ${mName(tx.to)} ${fmt(tx.amt,t.baseCurrency)}\n`;});
    }
    this.closeModal('m-trip-menu');
    navigator.clipboard?.writeText(text)
      .then(()=>this.showToast('結算結果已複製！'))
      .catch(()=>{prompt('複製此結算結果：',text);});
  },

  openExportDetail(){
    const t=loadTrip(this.tripId);
    if(!t) return;
    this.closeModal('m-trip-menu');
    document.getElementById('export-detail-content').innerHTML=this._buildExportHTML(t);
    this.openModal('m-export-detail');
  },

  _buildExportHTML(t){
    const members=t.members||[];
    const exps=Object.values(t.expenses||{}).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    const baseCur=t.baseCurrency||'TWD';
    const baseSym=(C[baseCur]||C.TWD).sym;
    const mName=id=>{const m=members.find(m=>m.id===id);return m?.name||id;};
    const otherCurs=[...new Set(exps.map(e=>e.currency||baseCur))].filter(c=>c&&c!==baseCur);
    const allCurs=[baseCur,...otherCurs];
    const thS='padding:7px 9px;background:#F3F4F6;font-size:11px;font-weight:700;white-space:nowrap;border:1px solid #D1D5DB;text-align:center;';
    const tdS='padding:6px 9px;font-size:11px;border:1px solid #E5E7EB;white-space:nowrap;vertical-align:middle;';
    const numS=tdS+'text-align:right;';
    const blank=`<td style="${tdS}"></td>`;
    const fixedLeft=5;const fixedMid=3;
    const totalCols=fixedLeft+allCurs.length+fixedMid+members.length;
    const splitLabel=m=>({equal:'平均',custom:'自訂',proportion:'比例',self:'自購'}[m]||'平均');
    const mbl=i=>i===0?'border-left:2.5px solid #9CA3AF;':'';
    // TTL row styles — strong top border for clear separation
    const ttl1=`padding:6px 9px;font-size:11px;background:#EEF2FF;border:1px solid #C7D2FE;border-top:2px solid #818CF8;white-space:nowrap;vertical-align:middle;`;
    const ttl1n=ttl1+'text-align:right;';
    const ttl2=`padding:6px 9px;font-size:11px;background:#EEF2FF;border:1px solid #C7D2FE;white-space:nowrap;vertical-align:middle;`;
    const ttl2n=ttl2+'text-align:right;';
    const tblank1=`<td style="${ttl1}"></td>`;
    const tblank2=`<td style="${ttl2}"></td>`;
    // Rate rows
    const rateRows=otherCurs.map(c=>{
      const rate=t.rates[c]||DEF[c]||1;
      const after=totalCols-2;
      return `<tr><td style="${tdS}font-size:10px;color:#6B7280;">${c} rate</td><td style="padding:6px 9px;font-size:11px;font-weight:700;background:#FDE68A;border:1px solid #D1D5DB;text-align:right;">${rate}</td>${Array(after).fill(blank).join('')}</tr>`;
    }).join('');
    // Header
    const mainHeader=`<tr>
      <th style="${thS}">日期</th><th style="${thS}">項目</th><th style="${thS}">明細</th><th style="${thS}">分攤方式</th><th style="${thS}">單位（人數）</th>
      ${allCurs.map(c=>`<th style="${thS}">${c}</th>`).join('')}
      <th style="${thS}">付款人</th><th style="${thS}">總金額(${baseCur})</th><th style="${thS}">單價(${baseCur})</th>
      ${members.map((m,i)=>`<th style="${thS}${mbl(i)}">${m.name}</th>`).join('')}
    </tr>`;
    // Separate accumulators: group vs personal
    const memberGroupShare={};const memberSelfPay={};const memberGroupPaid={};
    members.forEach(m=>{memberGroupShare[m.id]=0;memberSelfPay[m.id]=0;memberGroupPaid[m.id]=0;});
    const buildRows=(list,isGroup=true)=>list.map(e=>{
      const expCur=e.currency||baseCur;
      const isPending=e.note==='金額待補';
      const ps=e.parts||members.map(m=>m.id);
      const payer=typeof e.paidBy==='object'?'多人':(members.find(m=>m.id===e.paidBy)?.name||'?');
      const baseTotalNum=isPending?0:Math.round(toBase(e.amount,expCur,t.rates,baseCur));
      const unitPrice=ps.length>0?Math.round(baseTotalNum/ps.length):0;
      if(isGroup&&!isPending){
        if(typeof e.paidBy==='string'&&memberGroupPaid[e.paidBy]!==undefined) memberGroupPaid[e.paidBy]+=baseTotalNum;
        else if(typeof e.paidBy==='object'&&e.paidBy) Object.entries(e.paidBy).forEach(([pid,amt])=>{if(memberGroupPaid[pid]!==undefined) memberGroupPaid[pid]+=Math.round(toBase(amt,expCur,t.rates,baseCur));});
      }
      const curCells=allCurs.map(c=>{
        if(c===expCur) return `<td style="${numS}${isPending?'color:#F97316;':''}">${isPending?'待補':Number(e.amount).toLocaleString()}</td>`;
        return blank;
      }).join('');
      const memberCells=members.map(m=>{
        const _mbl=mbl(members.indexOf(m));
        if(!ps.includes(m.id)) return `<td style="${numS}${_mbl}color:#9CA3AF;">—</td>`;
        if(isPending) return `<td style="${numS}${_mbl}color:#F97316;">待補</td>`;
        let sh;
        if((e.splitMode==='custom'||e.splitMode==='proportion')&&e.customAmounts) sh=e.customAmounts[m.id]||0;
        else sh=e.amount/ps.length;
        const shBase=Math.round(toBase(sh,expCur,t.rates,baseCur));
        if(isGroup) memberGroupShare[m.id]+=shBase; else memberSelfPay[m.id]+=shBase;
        return `<td style="${numS}${_mbl}">${shBase.toLocaleString()}</td>`;
      }).join('');
      return `<tr>
        <td style="${tdS}">${e.date||'—'}</td>
        <td style="${tdS}">${e.category||'其他'}</td>
        <td style="${tdS}font-weight:600;">${e.name}</td>
        <td style="${tdS}text-align:center;">${(e.splitMode==='proportion'&&e.proportions?`比例 ${members.map(m=>Math.round(e.proportions[m.id]||0)).join('/')}%`:splitLabel(e.splitMode))}</td>
        <td style="${tdS}text-align:center;">${ps.length}</td>
        ${curCells}
        <td style="${tdS}text-align:center;">${payer}</td>
        <td style="${numS}font-weight:600;${isPending?'color:#F97316;':''}">${isPending?'待補':baseTotalNum.toLocaleString()}</td>
        <td style="${numS}">${isPending?'—':unitPrice.toLocaleString()}</td>
        ${memberCells}
      </tr>`;
    }).join('');
    const sectionRow=(label,bg='#EEF2FF',color='#4338CA',bc='#C7D2FE')=>`<tr><td colspan="${totalCols}" style="padding:7px 10px;font-size:12px;font-weight:700;background:${bg};border:1px solid ${bc};color:${color};">${label}</td></tr>`;
    const groupExps=exps.filter(e=>e.splitMode!=='self');
    const personalExps=exps.filter(e=>e.splitMode==='self');
    const groupRows=buildRows(groupExps,true);
    // Group TTL
    const groupCurTotals=allCurs.map(c=>{
      const s=groupExps.filter(e=>(e.currency||baseCur)===c&&e.note!=='金額待補').reduce((a,e)=>a+e.amount,0);
      return s>0?`<td style="${ttl1n}font-weight:700;">${Math.round(s).toLocaleString()}</td>`:tblank1;
    }).join('');
    const groupGrandTotal=groupExps.filter(e=>e.note!=='金額待補').reduce((s,e)=>s+toBase(e.amount,e.currency||baseCur,t.rates,baseCur),0);
    const groupTtlRows=`<tr>
      <td style="${ttl1}font-weight:700;">TTL</td><td style="${ttl1}font-weight:700;">共同支出花費</td><td style="${ttl1}"></td><td style="${ttl1}"></td><td style="${ttl1}"></td>
      ${groupCurTotals}
      <td style="${ttl1}"></td>
      <td style="${ttl1n}font-weight:700;">${Math.round(groupGrandTotal).toLocaleString()}</td>
      <td style="${ttl1}font-weight:700;text-align:center;">每人</td>
      ${members.map((m,i)=>`<td style="${ttl1n}${mbl(i)}font-weight:700;">${(memberGroupShare[m.id]||0).toLocaleString()}</td>`).join('')}
    </tr>
    <tr>
      ${Array(fixedLeft+allCurs.length+2).fill(tblank2).join('')}
      <td style="${ttl2}text-align:center;color:#6B7280;">已付款</td>
      ${members.map((m,i)=>`<td style="${ttl2n}${mbl(i)}">${(memberGroupPaid[m.id]||0).toLocaleString()}</td>`).join('')}
    </tr>
    <tr>
      ${Array(fixedLeft+allCurs.length+2).fill(tblank2).join('')}
      <td style="${ttl2}text-align:center;font-weight:700;color:#EF4444;">待付款</td>
      ${members.map((m,i)=>{
        const owed=(memberGroupShare[m.id]||0)-(memberGroupPaid[m.id]||0);
        const col=owed>0?'#EF4444':owed<0?'#22c55e':'#6B7280';
        return `<td style="${ttl2n}${mbl(i)}font-weight:700;color:${col};">${owed>0?owed.toLocaleString():owed<0?'('+(-owed).toLocaleString()+')':0}</td>`;
      }).join('')}
    </tr>`;
    // Personal section
    let personalSection='';
    if(personalExps.length){
      const personalDataRows=buildRows(personalExps,false);
      const pttl1=`padding:6px 9px;font-size:11px;background:#DCFCE7;border:1px solid #86EFAC;border-top:2px solid #22c55e;white-space:nowrap;vertical-align:middle;`;
      const pttl1n=pttl1+'text-align:right;';
      const ptblank=`<td style="${pttl1}"></td>`;
      const personalCurTotals=allCurs.map(c=>{
        const s=personalExps.filter(e=>(e.currency||baseCur)===c&&e.note!=='金額待補').reduce((a,e)=>a+e.amount,0);
        return s>0?`<td style="${pttl1n}font-weight:700;">${Math.round(s).toLocaleString()}</td>`:ptblank;
      }).join('');
      const personalGrandTotal=personalExps.filter(e=>e.note!=='金額待補').reduce((s,e)=>s+toBase(e.amount,e.currency||baseCur,t.rates,baseCur),0);
      const personalTtlRow=`<tr>
        <td style="${pttl1}font-weight:700;">TTL</td><td style="${pttl1}font-weight:700;">個人自費</td><td style="${pttl1}"></td><td style="${pttl1}"></td><td style="${pttl1}"></td>
        ${personalCurTotals}
        <td style="${pttl1}"></td>
        <td style="${pttl1n}font-weight:700;">${Math.round(personalGrandTotal).toLocaleString()}</td>
        <td style="${pttl1}font-weight:700;text-align:center;">自費</td>
        ${members.map((m,i)=>`<td style="${pttl1n}${mbl(i)}font-weight:700;">${(memberSelfPay[m.id]||0).toLocaleString()}</td>`).join('')}
      </tr>`;
      personalSection=sectionRow('個人支出明細','#F0FDF4','#166534','#86EFAC')+personalDataRows+personalTtlRow;
    }
    // Combined total
    const cttl=`padding:6px 9px;font-size:11px;background:#FEF9C3;border:1px solid #FDE68A;border-top:2px solid #F59E0B;white-space:nowrap;vertical-align:middle;`;
    const cttln=cttl+'text-align:right;';
    const ctblank=`<td style="${cttl}"></td>`;
    const combinedCurTotals=allCurs.map(c=>{
      const s=exps.filter(e=>(e.currency||baseCur)===c&&e.note!=='金額待補').reduce((a,e)=>a+e.amount,0);
      return s>0?`<td style="${cttln}font-weight:700;">${Math.round(s).toLocaleString()}</td>`:ctblank;
    }).join('');
    const combinedGrandTotal=exps.filter(e=>e.note!=='金額待補').reduce((s,e)=>s+toBase(e.amount,e.currency||baseCur,t.rates,baseCur),0);
    const combinedSection=sectionRow('整趟旅程完整花費（群組＋個人）','#FEF9C3','#92400E','#FDE68A')+`<tr>
      <td style="${cttl}font-weight:700;">合計</td><td style="${cttl}font-weight:700;">全部費用</td><td style="${cttl}"></td><td style="${cttl}"></td><td style="${cttl}"></td>
      ${combinedCurTotals}

      <td style="${cttln}font-weight:700;">${Math.round(combinedGrandTotal).toLocaleString()}</td>

    // Settlement (renamed)
    const bal=calcBal(t);const txs=minimizeTx(bal);

      <div style="font-size:13px;font-weight:700;margin:24px 0 8px;">群組結算-債務關係</div>

  exportCSV(){
    const t=loadTrip(this.tripId);
    if(!t) return;
    const members=t.members||[];
    const exps=Object.values(t.expenses||{}).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    const baseCur=t.baseCurrency||'TWD';
    const baseSym=(C[baseCur]||C.TWD).sym;
    const esc=v=>`"${String(v).replace(/"/g,'""')}"`;
    const mName=id=>{const m=members.find(m=>m.id===id);return m?.name||id;};
    const otherCurs=[...new Set(exps.map(e=>e.currency||baseCur))].filter(c=>c&&c!==baseCur);
    const allCurs=[baseCur,...otherCurs];
    const fixedLeft=5; // 日期,項目,明細,分攤方式,單位
    const fixedMid=3;  // 付款人,總金額,單價
    const totalCols=fixedLeft+allCurs.length+fixedMid+members.length;
    const empties=n=>Array(n).fill('');
    const splitLabel=m=>({equal:'平均',custom:'自訂',proportion:'比例',self:'自購'}[m]||'平均');

    let csv='﻿'; // BOM

    // Rate rows
    otherCurs.forEach(c=>{
      const rate=t.rates[c]||DEF[c]||1;
      const row=[`${c} rate`,rate,...empties(totalCols-2)];
      csv+=row.map(esc).join(',')+'\n';
    });

    // Header row
    const header=['日期','項目','明細','分攤方式','單位（人數）',...allCurs,'付款人',`總金額(${baseCur})`,`單價(${baseCur})`,...members.map(m=>m.name)];
    csv+=header.map(esc).join(',')+'\n';

    // Accumulators
    const memberShare={};const memberPaid={};
    members.forEach(m=>{memberShare[m.id]=0;memberPaid[m.id]=0;});

    const buildRows=(list)=>{
      list.forEach(e=>{
        const expCur=e.currency||baseCur;
        const isPending=e.note==='金額待補';
        const ps=e.parts||members.map(m=>m.id);
        const payer=typeof e.paidBy==='object'?'多人':(members.find(m=>m.id===e.paidBy)?.name||'?');
        const baseTotalNum=isPending?0:Math.round(toBase(e.amount,expCur,t.rates,baseCur));
        const unitPrice=ps.length>0?Math.round(baseTotalNum/ps.length):0;
        if(!isPending){
          if(typeof e.paidBy==='string'&&memberPaid[e.paidBy]!==undefined) memberPaid[e.paidBy]+=baseTotalNum;
          else if(typeof e.paidBy==='object'&&e.paidBy) Object.entries(e.paidBy).forEach(([pid,amt])=>{if(memberPaid[pid]!==undefined) memberPaid[pid]+=Math.round(toBase(amt,expCur,t.rates,baseCur));});
        }
        const curCells=allCurs.map(c=>c===expCur?(isPending?'待補':e.amount):'');
        const memberCells=members.map(m=>{
          if(!ps.includes(m.id)) return '';
          if(isPending) return '待補';
          let sh;
          if((e.splitMode==='custom'||e.splitMode==='proportion')&&e.customAmounts) sh=e.customAmounts[m.id]||0;
          else sh=e.amount/ps.length;
          const shBase=Math.round(toBase(sh,expCur,t.rates,baseCur));
          memberShare[m.id]+=shBase;
          return shBase;
        });
        const row=[e.date||'',e.category||'其他',e.name,(e.splitMode==='proportion'&&e.proportions?`比例 ${members.map(m=>Math.round(e.proportions[m.id]||0)).join('/')}%`:splitLabel(e.splitMode)),ps.length,...curCells,payer,isPending?'待補':baseTotalNum,isPending?'':unitPrice,...memberCells];
        csv+=row.map(esc).join(',')+'\n';
      });
    };

    const sectionRow=label=>{
      csv+=[label,...empties(totalCols-1)].map(esc).join(',')+'\n';
    };

    // Group expenses
    const groupExps=exps.filter(e=>e.splitMode!=='self');
    const personalExps=exps.filter(e=>e.splitMode==='self');
    sectionRow('群組支出明細');
    buildRows(groupExps);

    // TTL rows
    const curTotals=allCurs.map(c=>{
      const s=groupExps.filter(e=>(e.currency||baseCur)===c&&e.note!=='金額待補').reduce((a,e)=>a+e.amount,0);
      return s>0?Math.round(s):'';
    });
    const grandTotal=groupExps.filter(e=>e.note!=='金額待補').reduce((s,e)=>s+toBase(e.amount,e.currency||baseCur,t.rates,baseCur),0);
    const ttlRow1=['TTL','共同支出花費','','',...empties(1),...curTotals,'',Math.round(grandTotal),'每人',...members.map(m=>memberShare[m.id]||0)];
    const ttlRow2=[...empties(fixedLeft+allCurs.length+fixedMid-1),'已付款',...members.map(m=>memberPaid[m.id]||0)];
    const ttlRow3=[...empties(fixedLeft+allCurs.length+fixedMid-1),'待付款',...members.map(m=>{
      const owed=(memberShare[m.id]||0)-(memberPaid[m.id]||0);
      return owed>0?owed:owed<0?`(${-owed})`:0;
    })];
    csv+=ttlRow1.map(esc).join(',')+'\n';
    csv+=ttlRow2.map(esc).join(',')+'\n';
    csv+=ttlRow3.map(esc).join(',')+'\n';

    // Personal expenses
    if(personalExps.length){
      sectionRow('個人支出明細');
      buildRows(personalExps);
    }

    // Settlement
    const bal=calcBal(t);
    const txs=minimizeTx(bal);
    csv+='\n'+['付款人','→','收款人',`金額(${baseCur})`].map(esc).join(',')+'\n';
    txs.forEach(tx=>{csv+=[mName(tx.from),'→',mName(tx.to),`${baseSym}${Math.round(tx.amt).toLocaleString()}`].map(esc).join(',')+'\n';});
    if(txs.length===0) csv+=['（大家都平帳了）'].map(esc).join(',')+'\n';

    const fileName=`${t.name}_支出明細.csv`;
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    if(navigator.share&&navigator.canShare){
      const file=new File([blob],fileName,{type:'text/csv'});
      if(navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:t.name}).catch(()=>{});
        return;
      }
    }
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=fileName;a.click();
    URL.revokeObjectURL(url);
    this.showToast('CSV 已下載');
  },

  exportSettlementPDF(){

      ?`<div style="text-align:center;padding:40px 20px;color:#6B7280;font-size:16px;">🎉 大家都平帳了！不需要轉帳</div>`

          <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#F9FAFB;">

              <span style="background:${avColor(ot.from)};color:#fff;border-radius:50%;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;">${mName(ot.from).charAt(0)}</span>
              ${mName(ot.from)}
              <span style="color:#9CA3AF;font-weight:400;">→</span>
              <span style="background:${avColor(ot.to)};color:#fff;border-radius:50%;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;">${mName(ot.to).charAt(0)}</span>
              ${mName(ot.to)}
            </div>
            <div style="color:${statusColor};font-weight:700;font-size:13px;white-space:nowrap;">${statusText}</div>
          </div>
          <div style="padding:10px 16px;">
            <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #E5E7EB;color:#6B7280;font-size:13px;">
              <span>原始欠款</span><span style="font-weight:600;color:#111;">${fmtAmt(ot.amt)}</span>
            </div>
            ${payRows}
            ${!isSettled&&matched.length>0?`<div style="display:flex;justify-content:space-between;padding:8px 0;font-weight:700;font-size:14px;"><span>剩餘</span><span style="color:#F97316;">${fmtAmt(remainBase)}</span></div>`:''}
          </div>
        </div>`;
      }).join('');

    const html=`<!DOCTYPE html><html><head><meta charset="utf-8">
      <title>${t.name} 轉帳結清明細</title>
      <style>
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:28px 24px;color:#111;max-width:600px;margin:0 auto;}
        h1{font-size:20px;font-weight:800;color:#6366F1;margin:0 0 4px;}
        .sub{font-size:13px;color:#6B7280;margin:0 0 24px;}
        @media print{.no-print{display:none;}}
      </style>
    </head><body>
      <h1>${t.name}　轉帳結清明細</h1>
      <p class="sub">產生時間：${dateStr}</p>
      ${cards}
      <br>
      <button class="no-print" onclick="window.print()" style="width:100%;padding:12px;background:#6366F1;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;">列印／存成 PDF</button>
    </body></html>`;

    this.closeModal('m-trip-menu');
    const win=window.open('','_blank');
    win.document.write(html);
    win.document.close();
  },

    const payRecs=t.payRecords||[];
    const fmtAmt=amt=>`${baseSym}${Math.round(amt).toLocaleString()}`;
    let text=`【${t.name} 轉帳結清明細】\n`;
    const now=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Taipei'}));
    text+=`產生時間：${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}\n\n`;
    if(origTxs.length===0){
      text+='大家都平帳了！不需要轉帳 🎉';
    } else {
      origTxs.forEach(ot=>{
        const matched=payRecs.filter(r=>r.from===ot.from&&r.to===ot.to);
        const paidBase=matched.reduce((s,r)=>s+toBase(r.amt,r.cur||baseCur,t.rates,baseCur),0);
        const remainBase=ot.amt-paidBase;
        const isSettled=remainBase<=0.5;
        text+=`${mName(ot.from)} → ${mName(ot.to)}\n`;
        text+=`　原始欠款：${fmtAmt(ot.amt)}\n`;
        matched.forEach(r=>{
          const rSym=(C[r.cur||baseCur]||C.TWD).sym;
          const parts=[];
          if(r.date) parts.push(r.date);
          if(r.note) parts.push(r.note);
          const label=parts.length?parts.join(' '):'付款';
          text+=`　${label}  −${rSym}${Math.round(r.amt).toLocaleString()}\n`;
        });
        if(isSettled){
          text+=`　✓ 已全數結清\n`;
        } else if(matched.length>0){
          text+=`　剩餘：${fmtAmt(remainBase)}\n`;
        } else {
          text+=`　尚未付款\n`;
        }
        text+='\n';
      });
    }
    document.getElementById('settlement-text-area').value=text.trimEnd();
    this.closeModal('m-trip-menu');
    this.openModal('m-settlement-text');
  },

  copySettlementText(){
    const ta=document.getElementById('settlement-text-area');
    const text=ta.value;
    if(navigator.clipboard){
      navigator.clipboard.writeText(text).then(()=>this.showToast('已複製轉帳明細'));
    } else {
      ta.select();document.execCommand('copy');this.showToast('已複製轉帳明細');
    }
  },

  shareToLine(){
    const text=document.getElementById('settlement-text-area').value;
    window.open('https://line.me/R/msg/text/?'+encodeURIComponent(text),'_blank');
  },

  deleteTrip(){
    const t=loadTrip(this.tripId);
    if(!confirm(`確定要刪除「${t?.name}」？所有資料都會消失。`)) return;
    delTrip(this.tripId);
    this.closeModal('m-trip-menu');
    this.go('home'); this.showToast('旅程已刪除');
  },
};

// ─── INIT ────────────────────────────────────────────────────
window.addEventListener('load',()=>{
  document.querySelectorAll('.modal-overlay').forEach(el=>{
    el.addEventListener('click',e=>{if(e.target===el) el.classList.remove('open');});
  });
  App.checkShare();
  const _trips=loadAll();
  Object.keys(_trips).forEach(id=>fbListen(id));
});
</script>
